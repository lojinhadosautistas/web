<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa da Nossa Mente | Observatório</title>

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>

body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
}

/* CARDS */
.cardx{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:.25s;
}

.cardx:hover{
  transform:translateY(-2px);
}

/* REGIÕES */
.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.region-item:hover{
  background:#eef2ff;
}

.region-active{
  background:#dbeafe;
  font-weight:600;
}

/* CÉREBRO */
.brain-container{
  overflow:hidden;
  text-align:center;
}

.brain-wrapper{
  transition:transform .4s ease;
}

.brain-area{
  cursor:pointer;
  transition:.2s;
  opacity:.85;
}

.brain-area:hover{
  opacity:1;
}

.brain-active{
  stroke:#000;
  stroke-width:2;
  opacity:1;
}

/* BOTÕES */
.controls button{
  margin:2px;
}

</style>

</head>

<body>

<div class="container py-4">

<h2>🧠 Mapa da Nossa Mente</h2>
<p class="text-muted">Modo Observatório — Interação Avançada</p>

<div class="row g-4">

<!-- ESQUERDA -->
<div class="col-lg-3">

<div class="cardx">
<h5>Regiões</h5>

<div class="region-item" data-id="prefrontal">🔴 Pré-frontal</div>
<div class="region-item" data-id="parietal">🟠 Parietal</div>
<div class="region-item" data-id="temporal">🔵 Temporal</div>
<div class="region-item" data-id="occipital">🟢 Occipital</div>
<div class="region-item" data-id="cerebelo">🟣 Cerebelo</div>
<div class="region-item" data-id="limbico">🟡 Límbico</div>
<div class="region-item" data-id="insula">🔷 Ínsula</div>

</div>

<div class="cardx mt-3">
<h5>Modo</h5>

<button class="btn btn-sm btn-outline-primary w-100 mb-2" onclick="modoFoco()">Modo Foco</button>
<button class="btn btn-sm btn-outline-secondary w-100" onclick="resetView()">Reset Geral</button>

</div>

</div>

<!-- CENTRO -->
<div class="col-lg-6">

<div class="cardx mb-3">
Clique em qualquer região do cérebro ou lista lateral.
</div>

<div class="cardx brain-container">

<div id="brainWrapper" class="brain-wrapper">

<svg viewBox="0 0 500 400" width="100%">

<path id="prefrontal" class="brain-area" fill="#ef4444" d="M100 100 L200 80 L220 140 L140 160 Z"/>
<path id="parietal" class="brain-area" fill="#f97316" d="M200 80 L320 100 L300 170 L220 140 Z"/>
<path id="temporal" class="brain-area" fill="#3b82f6" d="M200 180 L300 170 L280 260 L180 250 Z"/>
<path id="occipital" class="brain-area" fill="#22c55e" d="M320 100 L380 160 L340 200 L300 170 Z"/>
<path id="cerebelo" class="brain-area" fill="#7c3aed" d="M300 260 L380 240 L360 300 L280 260 Z"/>
<path id="limbico" class="brain-area" fill="#eab308" d="M220 140 L300 170 L260 200 L200 180 Z"/>
<path id="insula" class="brain-area" fill="#06b6d4" d="M230 160 L260 150 L250 180 L220 180 Z"/>

</svg>

</div>

<div class="controls mt-3 text-center">
<button class="btn btn-sm btn-outline-secondary" onclick="zoom(1.2)">+ Zoom</button>
<button class="btn btn-sm btn-outline-secondary" onclick="zoom(0.8)">- Zoom</button>
<button class="btn btn-sm btn-outline-secondary" onclick="resetZoom()">Reset Zoom</button>
</div>

</div>

</div>

<!-- DIREITA -->
<div class="col-lg-3">

<div class="cardx" id="painel">
Clique em uma região
</div>

</div>

</div>

</div>

<script>

let scale = 1;
let focoAtivo = false;

// DADOS
const regioes = {
prefrontal:{titulo:"Pré-frontal",desc:"Funções executivas"},
parietal:{titulo:"Parietal",desc:"Sensorial"},
temporal:{titulo:"Temporal",desc:"Linguagem"},
occipital:{titulo:"Occipital",desc:"Visual"},
cerebelo:{titulo:"Cerebelo",desc:"Coordenação"},
limbico:{titulo:"Límbico",desc:"Emoções"},
insula:{titulo:"Ínsula",desc:"Consciência"}
};

// SELEÇÃO
function selecionar(id){

// limpar
document.querySelectorAll('.brain-area').forEach(e=>e.classList.remove('brain-active'));
document.querySelectorAll('.region-item').forEach(e=>e.classList.remove('region-active'));

// ativar cérebro
document.getElementById(id).classList.add('brain-active');

// ativar lista
document.querySelector(`[data-id=${id}]`)?.classList.add('region-active');

// painel
let r = regioes[id];

document.getElementById("painel").innerHTML = `
<h5>${r.titulo}</h5>
<p>${r.desc}</p>
<hr>
<div class="tag bg-primary text-white">Região ativa</div>
`;

}

// LISTA CLICK
document.querySelectorAll('.region-item').forEach(el=>{
el.addEventListener('click',()=>selecionar(el.dataset.id));
});

// SVG CLICK
document.querySelectorAll('.brain-area').forEach(el=>{
el.addEventListener('click',()=>selecionar(el.id));
});

// ZOOM
function zoom(f){
scale *= f;
document.getElementById("brainWrapper").style.transform = `scale(${scale})`;
}

function resetZoom(){
scale = 1;
document.getElementById("brainWrapper").style.transform = `scale(1)`;
}

// FOCO
function modoFoco(){
focoAtivo = !focoAtivo;

document.querySelectorAll('.brain-area').forEach(el=>{
el.style.opacity = focoAtivo ? 0.2 : 0.85;
});
}

// RESET
function resetView(){
resetZoom();
focoAtivo = false;

document.querySelectorAll('.brain-area').forEach(el=>{
el.style.opacity = 0.85;
el.classList.remove('brain-active');
});

document.querySelectorAll('.region-item').forEach(el=>{
el.classList.remove('region-active');
});

document.getElementById("painel").innerHTML = "Clique em uma região";

}

</script>

</body>
</html>
