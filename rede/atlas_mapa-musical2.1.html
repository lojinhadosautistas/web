<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema REDE | Atlas Cognitivo - Mapa Musical</title>

<link href="../assets/img/favicon.png" rel="icon">
<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="../assets/css/hub.css">
<link rel="stylesheet" href="css/ram-global.css">

<style>

body{
  margin:0;
  font-family: Inter, sans-serif;
}

/* MAPA FULL AJUSTADO */
#map{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* FILTRO (OVERLAY) */
.topbar{
  position:absolute;
  top:80px; /* evita header do sistema */
  left:20px;
  z-index:1000;
}

.topbar select{
  padding:10px;
  border-radius:10px;
  border:none;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

/* PLAYER FLUTUANTE */
.player-box{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  z-index:1000;
  background:white;
  padding:10px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

iframe{
  width:100%;
  height:160px;
  border:none;
  border-radius:10px;
}

/* DESKTOP */
@media(min-width:768px){

  .player-box{
    max-width:400px;
  }

}

</style>

</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div id="map"></div>

<!-- FILTRO -->
<div class="topbar">
  <select id="filtro">
    <option value="all">🎼 Todos</option>
    <option value="icone">🎤 Ícones</option>
  </select>
</div>

<!-- PLAYER -->
<div class="player-box">
  <iframe id="player"></iframe>
</div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAPA
const map = L.map('map', {
  zoomControl: true
}).setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

// DADOS
const artistas = [
  {nome:"Michael Jackson",tipo:"icone",coords:[41.5934,-87.3464],local:"EUA",youtube:"https://www.youtube.com/embed/Zi_XLOBDo_Y"},
  {nome:"Freddie Mercury",tipo:"icone",coords:[-6.1659,39.1979],local:"Tanzânia",youtube:"https://www.youtube.com/embed/fJ9rUzIMcZQ"},
  {nome:"Whitney Houston",tipo:"icone",coords:[40.7357,-74.1724],local:"EUA",youtube:"https://www.youtube.com/embed/3JWTaaS7LdU"},
  {nome:"Luiz Gonzaga",tipo:"icone",coords:[-7.5113,-39.7242],local:"Brasil",youtube:"https://www.youtube.com/embed/3VYhM0p7qSg"},
  {nome:"Chico Buarque",tipo:"icone",coords:[-22.9068,-43.1729],local:"Brasil",youtube:"https://www.youtube.com/embed/2h4C1q8g6i8"}
];

// MARKERS
let markers=[];

// RENDER
function render(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const filtro=document.getElementById("filtro").value;

  artistas.forEach(a=>{

    if(filtro!=="all" && a.tipo!==filtro) return;

    const m=L.circleMarker(a.coords,{
      radius:10,
      color:"#8b5cf6",
      fillColor:"#8b5cf6",
      fillOpacity:0.85
    }).addTo(map);

    m.bindPopup(`
      <b>${a.nome}</b><br>
      ${a.local}<br><br>
      <button onclick="tocar('${a.youtube}')">▶️ Ouvir</button>
    `);

    // UX MELHOR: clique direto toca
    m.on("click",()=>{
      tocar(a.youtube);
    });

    markers.push(m);

  });

}

render();

// PLAYER
function tocar(link){
  document.getElementById("player").src = link;
}

// FILTRO
document.getElementById("filtro").addEventListener("change",render);

// GEOLOCALIZAÇÃO
navigator.geolocation.getCurrentPosition(pos=>{
  L.marker([pos.coords.latitude,pos.coords.longitude])
    .addTo(map)
    .bindPopup("📍 Você está aqui");
});

</script>

</body>
</html>
