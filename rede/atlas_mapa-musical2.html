<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Musical V2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  font-family: Inter, sans-serif;
  background:#f4f6fb;
  margin:0;
}

.container{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:12px;
  padding:12px;
}

.header{
  grid-column: span 2;
  background:white;
  padding:16px;
  border-radius:12px;
}

#map{
  height:75vh;
  border-radius:12px;
}

.panel{
  background:white;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  border:none;
  padding:10px;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

button.secondary{
  background:#10b981;
}

select{
  padding:8px;
  border-radius:8px;
}

iframe{
  width:100%;
  height:180px;
  border-radius:10px;
  border:none;
}

.log{
  max-height:150px;
  overflow:auto;
  font-size:13px;
  background:#f9fafb;
  padding:8px;
  border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
  <h2>🎼 Mapa Musical V2</h2>
  <p>Exploração musical guiada + experiência emocional</p>
</div>

<div id="map"></div>

<div class="panel">

  <select id="filtro">
    <option value="all">Todos</option>
    <option value="icone">Ícones</option>
  </select>

  <button onclick="iniciarJornada()">🚀 Iniciar Jornada</button>

  <iframe id="player"></iframe>

  <div>
    <b>Como foi a experiência?</b><br><br>
    <button onclick="registrar('👍')">👍</button>
    <button onclick="registrar('😐')">😐</button>
    <button onclick="registrar('👎')">👎</button>
  </div>

  <div>
    <b>Histórico</b>
    <div class="log" id="log"></div>
  </div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ==========================
// MAPA
// ==========================

const map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

// ==========================
// JSON (RESUMIDO)
// ==========================

const artistas = [
  {
    nome:"Michael Jackson",
    tipo:"icone",
    coords:[41.5934,-87.3464],
    local:"EUA",
    musica:"Billie Jean",
    youtube:"https://www.youtube.com/embed/Zi_XLOBDo_Y",
    atividade:"Bater ritmo"
  },
  {
    nome:"Freddie Mercury",
    tipo:"icone",
    coords:[-6.1659,39.1979],
    local:"Tanzânia",
    musica:"Bohemian Rhapsody",
    youtube:"https://www.youtube.com/embed/fJ9rUzIMcZQ",
    atividade:"Explorar voz"
  },
  {
    nome:"Whitney Houston",
    tipo:"icone",
    coords:[40.7357,-74.1724],
    local:"EUA",
    musica:"I Will Always Love You",
    youtube:"https://www.youtube.com/embed/3JWTaaS7LdU",
    atividade:"Sentir intensidade"
  },
  {
    nome:"Luiz Gonzaga",
    tipo:"icone",
    coords:[-7.5113,-39.7242],
    local:"Brasil",
    musica:"Asa Branca",
    youtube:"https://www.youtube.com/embed/3VYhM0p7qSg",
    atividade:"Identificar instrumentos"
  },
  {
    nome:"Chico Buarque",
    tipo:"icone",
    coords:[-22.9068,-43.1729],
    local:"Brasil",
    musica:"Construção",
    youtube:"https://www.youtube.com/embed/2h4C1q8g6i8",
    atividade:"Perceber padrões"
  }
];

// ==========================
// VARIÁVEIS
// ==========================

let markers = [];
let jornadaIndex = 0;
let atual = null;

// ==========================
// RENDER
// ==========================

function render(){

  markers.forEach(m => map.removeLayer(m));
  markers=[];

  const filtro = document.getElementById("filtro").value;

  artistas.forEach(a => {

    if(filtro !== "all" && a.tipo !== filtro) return;

    const m = L.circleMarker(a.coords,{
      radius:10,
      color:"#8b5cf6",
      fillColor:"#8b5cf6",
      fillOpacity:0.8
    }).addTo(map);

    m.bindPopup(`
      <b>🎤 ${a.nome}</b><br>
      🌍 ${a.local}<br><br>
      🎵 ${a.musica}<br><br>
      🛠️ ${a.atividade}<br><br>
      <button onclick="tocar('${a.youtube}','${a.nome}')">▶️ Ouvir</button>
    `);

    markers.push(m);

  });

}

render();

// ==========================
// PLAYER
// ==========================

function tocar(link,nome){
  document.getElementById("player").src = link;
  atual = nome;
}

// ==========================
// JORNADA
// ==========================

function iniciarJornada(){
  jornadaIndex = 0;
  proximo();
}

function proximo(){

  if(jornadaIndex >= artistas.length){
    alert("Jornada finalizada!");
    return;
  }

  const a = artistas[jornadaIndex];

  map.setView(a.coords,5);
  tocar(a.youtube,a.nome);

  jornadaIndex++;

  setTimeout(proximo, 20000); // 20 segundos por ponto
}

// ==========================
// REGISTRO
// ==========================

function registrar(valor){

  if(!atual) return;

  const log = document.getElementById("log");

  const linha = document.createElement("div");
  linha.innerText = `${new Date().toLocaleTimeString()} - ${atual} ${valor}`;

  log.prepend(linha);

}

// ==========================
// FILTRO
// ==========================

document.getElementById("filtro").addEventListener("change", render);

// ==========================
// GEOLOCALIZAÇÃO
// ==========================

navigator.geolocation.getCurrentPosition(pos => {

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  L.marker([lat,lng]).addTo(map)
    .bindPopup("📍 Você está aqui");

  map.setView([lat,lng],4);

});

</script>

</body>
</html>
