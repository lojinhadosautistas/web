<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa do Autismo no Brasil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Inter;background:#f5f7fb;}
.hero{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white;padding:40px;border-radius:14px;}
.cardx{background:white;padding:16px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.05);}
#map{height:600px;border-radius:12px;}
.section{margin-top:25px;}

.regiao{cursor:pointer;padding:8px;border-radius:6px;margin-bottom:8px;}
.regiao:hover{background:#eef2ff;}
.regiao.ativa{background:#dbeafe;font-weight:600;}

.reset-btn{
  margin-top:10px;
  cursor:pointer;
  color:#2563eb;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container py-4">

<div class="hero">
<h1>Mapa do Autismo no Brasil</h1>
<p>Clique em uma região para filtrar</p>
</div>

<div class="section row">

<div class="col-lg-8">

<div id="map"></div>

<div class="cardx mt-3">

<h5>Distribuição por Região</h5>

<div class="regiao" data-regiao="SE">Sudeste</div>
<div class="regiao" data-regiao="NE">Nordeste</div>
<div class="regiao" data-regiao="S">Sul</div>
<div class="regiao" data-regiao="N">Norte</div>
<div class="regiao" data-regiao="CO">Centro-Oeste</div>

<div class="reset-btn" id="reset">Ver Brasil completo</div>

</div>

</div>

<div class="col-lg-4">

<div class="cardx mb-3">
<h5>Contexto</h5>
<div id="info">Brasil completo</div>
</div>

<div class="cardx">
<canvas id="chart"></canvas>
</div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([-14.2,-51.9],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DADOS
var dados = {
"SP":500000,"MG":250000,"RJ":200000,"BA":180000,
"PR":140000,"RS":130000,"CE":120000,"SC":80000,
"AM":60000,"DF":50000
};

// REGIÕES
const regioesUF = {
"SE":["SP","RJ","MG","ES"],
"NE":["BA","PE","CE","MA","PB","RN","AL","PI","SE"],
"S":["PR","RS","SC"],
"N":["AM","PA","RO","AC","AP","RR","TO"],
"CO":["DF","GO","MT","MS"]
};

let regiaoAtiva=null;
let geojson;

// COR
function getColor(v){
return v>400000?"#08306b":
       v>200000?"#2171b5":
       v>100000?"#4292c6":
       v>50000?"#6baed6":"#9ecae1";
}

// STYLE
function style(f){
let uf=f.properties.sigla;
let val=dados[uf]||20000;

// filtro
if(regiaoAtiva && !regioesUF[regiaoAtiva].includes(uf)){
return {fillColor:"#e5e7eb",weight:1,color:"#fff",fillOpacity:0.4};
}

return {fillColor:getColor(val),weight:1,color:"#fff",fillOpacity:0.8};
}

// ZOOM
function zoomRegiao(regiao){
let layers=[];
geojson.eachLayer(l=>{
if(regioesUF[regiao].includes(l.feature.properties.sigla)){
layers.push(l);
}
});
let group=L.featureGroup(layers);
map.fitBounds(group.getBounds());
}

// INFO
function updateInfo(){
if(!regiaoAtiva){
document.getElementById("info").innerHTML="Brasil completo";
return;
}
document.getElementById("info").innerHTML="Região: "+regiaoAtiva;
}

// CHART
let chart;
function updateChart(){
if(chart) chart.destroy();

let data = regiaoAtiva ? [2.3,2.8,2.0,1.0] : [2.1,2.6,1.9,0.9];

chart=new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:["0-4","5-9","10-14","Adultos"],
datasets:[{data:data}]
}
});
}

// CLICK REGIÃO
document.querySelectorAll('.regiao').forEach(el=>{
el.onclick=function(){

let r=this.dataset.regiao;

regiaoAtiva=r;

document.querySelectorAll('.regiao').forEach(e=>e.classList.remove('ativa'));
this.classList.add('ativa');

zoomRegiao(r);
geojson.setStyle(style);

updateInfo();
updateChart();

};
});

// RESET
document.getElementById("reset").onclick=function(){
regiaoAtiva=null;
map.setView([-14.2,-51.9],4);
document.querySelectorAll('.regiao').forEach(e=>e.classList.remove('ativa'));
geojson.setStyle(style);
updateInfo();
updateChart();
};

// GEOJSON
fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson")
.then(r=>r.json())
.then(data=>{
geojson=L.geoJson(data,{style:style}).addTo(map);
updateChart();
});

</script>

</body>
</html>
