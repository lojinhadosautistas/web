<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REDE v3 | Leitura Cognitiva do Acervo</title>

<!-- PDF.JS CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";
</script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  padding: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-size: 14px;
  color: #38bdf8;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 10px;
  background: #020617;
  color: white;
  padding: 10px;
}
</style>

</head>

<body>

<h1>🧠 REDE v3 — Leitura do Acervo</h1>

<button onclick="carregarAcervo()">📚 Ler Todo o Acervo</button>

<div id="status">Aguardando leitura...</div>

<textarea id="saida" placeholder="O acervo processado aparecerá aqui..."></textarea>

<script>

// 🔧 FUNÇÃO: Converter link do Google Drive
function converterDrive(url) {
  const match = url.match(/\\/d\\/(.*?)\\//);
  if (match && match[1]) {
    return `https://drive.google.com/uc?export=download&id=${match[1]}`;
  }
  return url;
}

// 📄 FUNÇÃO: Extrair texto do PDF
async function extrairTextoPDF(url) {
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;
    let texto = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const strings = content.items.map(item => item.str);
      texto += strings.join(" ") + "\\n\\n";
    }

    return texto;

  } catch (erro) {
    console.error("Erro ao ler PDF:", url, erro);
    return "";
  }
}

// 📚 LISTA DO SEU ACERVO (EXTRAÍDA DO HTML)
const documentos = [
  "https://drive.google.com/file/d/1Ccxq-kaZV3Oz7T1GP9obDtAp1ULbSZYN/preview",
  "https://drive.google.com/file/d/1oWfLQspDjsb93KM1J5AabB7uHGVMkCDC/preview",
  "https://drive.google.com/file/d/10CzxjZGTQrqPraSsF6wRsXg4JytSggJv/preview",
  "https://drive.google.com/file/d/1FQPffAofqiAiHTaKIv49Y1P-E9ZQd6PW/preview",
  "https://drive.google.com/file/d/1NnzOiebEzgfE4jp3y5gnLI6QTsyZU2G6/preview",
  "https://drive.google.com/file/d/1mHX1e9Pfz-NsawSOboSeeTA40jK46GlN/preview",
  "https://drive.google.com/file/d/1lKM9hJE1rfadxwCPMprah9dRG34ciepi/preview",
  "https://drive.google.com/file/d/12oPYfggle5VhPPRW_HUU2aBV0QAVM9l7/preview",
  "https://drive.google.com/file/d/1hEP0wleJPaWEknGmM7bN21gpsBJfNBNa/preview"
];

let acervoTexto = "";

// 🚀 FUNÇÃO PRINCIPAL
async function carregarAcervo() {

  const status = document.getElementById("status");
  const saida = document.getElementById("saida");

  status.innerText = "🔄 Iniciando leitura do acervo...";
  acervoTexto = "";

  for (let i = 0; i < documentos.length; i++) {

    const urlOriginal = documentos[i];
    const urlConvertida = converterDrive(urlOriginal);

    status.innerText = `📄 Lendo documento ${i + 1} de ${documentos.length}...`;

    const texto = await extrairTextoPDF(urlConvertida);

    acervoTexto += `\\n\\n=== DOCUMENTO ${i + 1} ===\\n\\n`;
    acervoTexto += texto;
  }

  status.innerText = "✅ Acervo carregado com sucesso!";
  saida.value = acervoTexto;

  console.log("ACERVO COMPLETO:", acervoTexto);
}

// 🧠 GERAR PROMPT PARA LUCAS
function gerarPromptLUCAS() {
  return `
Você é LUCAS, agente do Sistema REDE.

Abaixo está o acervo completo:

${acervoTexto}

Sua tarefa:
- Interpretar
- Conectar
- Gerar insights
- Propor estratégias

Estruture em:
Contexto
Análise
Conexões
Recomendações
`;
}

</script>

</body>
</html>
