<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa do Autismo no Brasil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family: Inter, sans-serif;
  background:#f5f7fb;
}

.hero{
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:50px;
  border-radius:16px;
}

.cardx{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

#map{
  height:600px;
  border-radius:14px;
}

.section{ margin-top:30px; }

.rank-bar{
  height:6px;
  background:#e5e7eb;
  border-radius:6px;
  margin-bottom:12px;
}

.rank-fill{
  height:6px;
  background:#2563eb;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="hero">
<h1>Mapa do Autismo no Brasil</h1>
<p>Baseado no Censo 2022 do IBGE</p>
</div>

<!-- KPIs -->
<div class="section row g-3">

<div class="col-lg-3"><div class="cardx text-center"><h2>2,4M</h2><p>Pessoas com autismo</p></div></div>
<div class="col-lg-3"><div class="cardx text-center"><h2>1,2%</h2><p>Prevalência</p></div></div>
<div class="col-lg-3"><div class="cardx text-center"><h2>760 mil</h2><p>Estudantes</p></div></div>
<div class="col-lg-3"><div class="cardx text-center"><h2>66,8%</h2><p>Ensino fundamental</p></div></div>

</div>

<!-- FILTRO -->
<div class="section cardx">
<label><b>Visualizar por:</b></label>
<select id="filtro">
<option value="pop">População estimada</option>
<option value="prev">Prevalência (%)</option>
</select>
</div>

<!-- MAP + SIDE -->
<div class="section row g-4">

<div class="col-lg-8">

<div id="map"></div>

<!-- REGIÕES -->
<div class="section cardx mt-3">

<h4><i class="bi bi-bar-chart"></i> Distribuição por Região</h4>

<div><b>Sudeste</b></div>
<div class="rank-bar"><div class="rank-fill" style="width:100%"></div></div>

<div><b>Nordeste</b></div>
<div class="rank-bar"><div class="rank-fill" style="width:63%"></div></div>

<div><b>Sul</b></div>
<div class="rank-bar"><div class="rank-fill" style="width:35%"></div></div>

<div><b>Norte</b></div>
<div class="rank-bar"><div class="rank-fill" style="width:20%"></div></div>

<div><b>Centro-Oeste</b></div>
<div class="rank-bar"><div class="rank-fill" style="width:18%"></div></div>

</div>

</div>

<div class="col-lg-4">

<div class="cardx mb-3">
<h5>Estado selecionado</h5>
<div id="info">Clique em um estado</div>
</div>

<div class="cardx mb-3">
<h5>Distribuição etária</h5>
<canvas id="chart"></canvas>
</div>

<div class="cardx">
<h5>Ranking</h5>
<div id="ranking"></div>
</div>

</div>

</div>

</div>

<!-- LIBS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([-14.2, -51.9], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DADOS
var dados = {
  "SP": {pop:500000, prev:1.2},
  "MG": {pop:250000, prev:1.2},
  "RJ": {pop:200000, prev:1.2},
  "BA": {pop:180000, prev:1.2},
  "PR": {pop:140000, prev:1.2},
  "RS": {pop:130000, prev:1.2},
  "CE": {pop:120000, prev:1.2},
  "SC": {pop:80000, prev:1.2},
  "AM": {pop:60000, prev:1.2},
  "DF": {pop:50000, prev:1.1}
};

// COR
function getColor(v){
  return v>400000?"#08306b":
         v>200000?"#2171b5":
         v>100000?"#4292c6":
         v>50000?"#6baed6":
         "#9ecae1";
}

// STYLE
function style(f){
  let uf = f.properties.sigla;
  let tipo = document.getElementById("filtro").value;
  let val = dados[uf]?dados[uf][tipo]:0;

  return { fillColor:getColor(val), weight:1, color:"#fff", fillOpacity:0.8 };
}

// PANEL + CHART
let chart;

function updatePanel(uf, nome){
  let d = dados[uf];

  document.getElementById("info").innerHTML = `
    <b>${nome}</b><br><br>
    Pessoas: ${d?d.pop.toLocaleString():"-"}<br>
    Prevalência: ${d?d.prev:"-"}%
  `;

  let ctx = document.getElementById('chart');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels:["0-4","5-9","10-14","Adultos"],
      datasets:[{
        label:"Prevalência",
        data:[2.1,2.6,1.9,0.9]
      }]
    }
  });
}

// RANKING
function renderRanking(){
  let arr = Object.entries(dados).sort((a,b)=>b[1].pop-a[1].pop);

  let html="";

  arr.forEach(([uf,d])=>{
    html+=`
      <div><b>${uf}</b> (${d.pop.toLocaleString()})</div>
      <div class="rank-bar"><div class="rank-fill" style="width:${d.pop/5000}%"></div></div>
    `;
  });

  document.getElementById("ranking").innerHTML=html;
}

renderRanking();

// GEOJSON
let geojson;

fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson")
.then(r=>r.json())
.then(data=>{
  geojson = L.geoJson(data,{
    style:style,
    onEachFeature:(f,l)=>{
      l.on('click',()=>{
        updatePanel(f.properties.sigla, f.properties.nome);
      });
    }
  }).addTo(map);
});

// FILTRO
document.getElementById("filtro").addEventListener("change",()=>{
  geojson.setStyle(style);
});

</script>

</body>
</html>
