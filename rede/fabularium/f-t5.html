<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabularium</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* header */

.header{

background:#020617;
padding:16px;
position:sticky;
top:0;
z-index:10;

}

.title{

font-size:20px;
font-weight:bold;
margin-bottom:10px;

}

.search{

width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;

}

/* categorias */

.categories{

display:flex;
gap:8px;
overflow:auto;
padding:10px;

}

.cat-btn{

background:#1e293b;
border:none;
color:white;
padding:6px 12px;
border-radius:20px;
cursor:pointer;

}

.cat-btn.active{

background:#6366f1;

}

/* história atual */

.now-playing{

padding:12px;
background:#1e293b;
display:none;
align-items:center;
gap:10px;

}

/* lista */

.story-list{

padding:12px;
padding-bottom:120px;

}

.story-item{

display:flex;
gap:12px;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
align-items:center;

}

.story-item.active{

background:#6366f1;

}

/* capa */

.cover{

width:50px;
height:50px;
border-radius:8px;
object-fit:cover;

}

/* favorito */

.favorite{

margin-left:auto;
cursor:pointer;

}

/* player */

.audio-player{

position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
padding:10px;
display:flex;
align-items:center;
gap:10px;

}

/* progresso */

.progress{

height:6px;
background:#1e293b;
border-radius:20px;
margin-top:6px;
cursor:pointer;

}

.progress-bar{

height:100%;
width:0%;
background:#6366f1;

}

/* controles */

.controls{

display:flex;
gap:8px;

}

.btn{

background:#1e293b;
border:none;
color:white;
width:38px;
height:38px;
border-radius:10px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;

}

/* animação tipo spotify */

.playing{

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}

}

/* visualizador */

.visualizer{

display:flex;
gap:3px;
height:16px;
margin-top:4px;

}

.bar{

width:3px;
background:#6366f1;
animation:equalize 1s infinite;

}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}

@keyframes equalize{

0%{height:4px}
50%{height:16px}
100%{height:4px}

}

/* tela cheia */

.fullscreen{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#020617;
z-index:50;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;

}

.fullscreen img{

width:200px;
height:200px;
border-radius:20px;

}

</style>
</head>

<body>

<div class="header">

<div class="title">
🌌 Fabularium
</div>

<input id="searchInput" class="search" placeholder="Buscar história...">

</div>

<div class="categories">

<button class="cat-btn active" data-cat="all">Todas</button>
<button class="cat-btn" data-cat="astronomia">Astronomia</button>
<button class="cat-btn" data-cat="biologia">Biologia</button>
<button class="cat-btn" data-cat="fisica">Física</button>
<button class="cat-btn" data-cat="fav">❤️ Favoritos</button>

</div>

<div id="nowPlaying" class="now-playing"></div>

<div class="story-list">

<div class="story-item"
data-cat="astronomia"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<img class="cover" src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<div class="story-title">Viagem pelas estrelas</div>

<div class="favorite"><i class="bi bi-heart"></i></div>

</div>

<div class="story-item"
data-cat="biologia"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">

<img class="cover" src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">

<div class="story-title">A floresta viva</div>

<div class="favorite"><i class="bi bi-heart"></i></div>

</div>

<div class="story-item"
data-cat="fisica"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1509395176047-4a66953fd231">

<img class="cover" src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">

<div class="story-title">O poder da eletricidade</div>

<div class="favorite"><i class="bi bi-heart"></i></div>

</div>

</div>

<!-- PLAYER -->

<div class="audio-player" id="player">

<img id="playerCover" class="cover">

<div style="flex:1">

<div id="playerTitle">Selecione uma história</div>

<div class="visualizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="progress" id="progress">

<div class="progress-bar" id="progressBar"></div>

</div>

</div>

<div class="controls">

<button id="prevBtn" class="btn">
<i class="bi bi-skip-start-fill"></i>
</button>

<button id="playBtn" class="btn">
<i class="bi bi-play-fill"></i>
</button>

<button id="nextBtn" class="btn">
<i class="bi bi-skip-end-fill"></i>
</button>

<button id="fullBtn" class="btn">
<i class="bi bi-arrows-fullscreen"></i>
</button>

</div>

<audio id="audio"></audio>

</div>

<script>

const items=[...document.querySelectorAll(".story-item")];
const audio=document.getElementById("audio");

const title=document.getElementById("playerTitle");
const cover=document.getElementById("playerCover");

const playBtn=document.getElementById("playBtn");
const nextBtn=document.getElementById("nextBtn");
const prevBtn=document.getElementById("prevBtn");

const progress=document.getElementById("progress");
const progressBar=document.getElementById("progressBar");

const search=document.getElementById("searchInput");

const cats=document.querySelectorAll(".cat-btn");

const now=document.getElementById("nowPlaying");

const player=document.getElementById("player");

let current=-1;

/* carregar */

function load(i){

items.forEach(x=>x.classList.remove("active"));

const item=items[i];

item.classList.add("active");

audio.src=item.dataset.audio;

title.textContent=item.querySelector(".story-title").innerText;

cover.src=item.dataset.cover;

current=i;

now.style.display="flex";

now.innerHTML=item.innerHTML;

audio.play();

playBtn.innerHTML=`<i class="bi bi-pause-fill"></i>`;

playBtn.classList.add("playing");

}

/* clique */

items.forEach((item,i)=>{

item.onclick=()=>load(i);

});

/* play pause */

playBtn.onclick=()=>{

if(audio.paused){

audio.play();
playBtn.innerHTML=`<i class="bi bi-pause-fill"></i>`;
playBtn.classList.add("playing");

}else{

audio.pause();
playBtn.innerHTML=`<i class="bi bi-play-fill"></i>`;
playBtn.classList.remove("playing");

}

};

/* próxima */

nextBtn.onclick=()=>{

let n=current+1;

if(n>=items.length)n=0;

load(n);

};

/* anterior */

prevBtn.onclick=()=>{

let p=current-1;

if(p<0)p=items.length-1;

load(p);

};

/* autoplay */

audio.onended=()=>nextBtn.onclick();

/* progresso */

audio.ontimeupdate=()=>{

let percent=(audio.currentTime/audio.duration)*100;

progressBar.style.width=percent+"%";

};

/* seek */

progress.onclick=e=>{

let w=progress.clientWidth;

audio.currentTime=(e.offsetX/w)*audio.duration;

};

/* busca */

search.oninput=()=>{

let v=search.value.toLowerCase();

items.forEach(i=>{

let t=i.innerText.toLowerCase();

i.style.display=t.includes(v)?"flex":"none";

});

};

/* fullscreen */

document.getElementById("fullBtn").onclick=()=>{

player.classList.toggle("fullscreen");

};

</script>

</body>
</html>
