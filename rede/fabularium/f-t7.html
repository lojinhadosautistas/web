<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fabularium | Biblioteca de Histórias</title>

<base href="../">

<link rel="stylesheet" href="../assets/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/vendor/bootstrap-icons/bootstrap-icons.css">
<link rel="stylesheet" href="../assets/css/hub.css">

<style>

/* espaço para o player fixo */

.main{
padding-bottom:160px;
}

/* animação do card quando tocando */

.story-item.playing{
background:#f1f5f9;
border-left:4px solid #2563eb;
}

/* barra de progresso dentro do card */

.card-progress{
position:absolute;
bottom:0;
left:0;
height:3px;
background:#38bdf8;
width:0%;
transition:width .2s linear;
}

/* garantir posição */

.story-item{
position:relative;
}

</style>

</head>

<body>

<!-- HEADER E SIDEBAR DO SISTEMA -->

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div class="page-title mb-4">

<h1 class="d-flex align-items-center gap-2">

FABULARIUM

<a href="memo.html">
<i class="bi bi-house-fill"></i>
</a>

</h1>

<p><strong>Biblioteca de Histórias, Ciência e Imaginação</strong></p>

</div>

<!-- =========================
BIBLIOTECA DE HISTÓRIAS
========================= -->

<div class="fabularium-library">

<!-- CARD 1 -->

<div class="story-item cat-nerd"
data-audio="fabularium/audios/pixacao-do-batmovel.mp3"
data-icon="bi-film">

<div class="story-icon icon-nerd">
<i class="bi bi-film"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-nerd">
MUNDO NERD
</div>

<div class="story-title">
A história da pixação do batmóvel
</div>

<div class="story-meta">
Aventuras Nerd
</div>

</div>

<div class="card-progress"></div>

</div>

<!-- CARD 2 -->

<div class="story-item cat-astronomia"
data-audio="fabularium/audios/james-webb-e-as-lrd_ep01.mp3"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-astronomia">
ASTRONOMIA
</div>

<div class="story-title">
As Aventuras do James Webb e as Little Red Dots
</div>

<div class="story-meta">
Cosmologia e Astronomia
</div>

</div>

<div class="card-progress"></div>

</div>

<!-- CARD 3 -->

<div class="story-item cat-astronomia"
data-audio="fabularium/audios/james-webb-e-as-lrd_ep02.mp3"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-astronomia">
ASTRONOMIA
</div>

<div class="story-title">
Little Red Dots no universo cangaceiro
</div>

<div class="story-meta">
Cosmologia e Astronomia
</div>

</div>

<div class="card-progress"></div>

</div>

</div>

</main>

<!-- =========================
PLAYER FIXO
========================= -->

<div class="audio-player">

<audio id="audioControl"></audio>

</div>

<script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/components.js"></script>

<script>

/* =========================
FABULARIUM ENGINE V7
========================= */

const cards = document.querySelectorAll(".story-item")
const audio = document.getElementById("audioControl")

let playlist=[]
let currentIndex=-1

cards.forEach((card,index)=>{

playlist.push(card)

card.addEventListener("click",()=>{

currentIndex=index
playCard(card)

})

})

function playCard(card){

const src=card.dataset.audio

if(!src) return

audio.src=src
audio.play()

cards.forEach(c=>c.classList.remove("playing"))
card.classList.add("playing")

}

/* =========================
NEXT / PREVIOUS
========================= */

const nextBtn=document.getElementById("nextBtn")
const prevBtn=document.getElementById("prevBtn")

if(nextBtn){

nextBtn.addEventListener("click",()=>{

if(currentIndex < playlist.length-1){

currentIndex++
playCard(playlist[currentIndex])

}

})

}

if(prevBtn){

prevBtn.addEventListener("click",()=>{

if(currentIndex>0){

currentIndex--
playCard(playlist[currentIndex])

}

})

}

/* =========================
AUTO NEXT
========================= */

audio.addEventListener("ended",()=>{

if(currentIndex < playlist.length-1){

currentIndex++
playCard(playlist[currentIndex])

}

})

/* =========================
PROGRESSO NO CARD
========================= */

audio.addEventListener("timeupdate",()=>{

if(currentIndex===-1) return

const progress=(audio.currentTime/audio.duration)*100

const card=playlist[currentIndex]

const bar=card.querySelector(".card-progress")

if(bar){

bar.style.width=progress+"%"

}

})

</script>

</body>
</html>
