<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabularium | Biblioteca de Histórias</title>

<base href="../">

<link rel="stylesheet" href="../assets/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/vendor/bootstrap-icons/bootstrap-icons.css">
<link rel="stylesheet" href="../assets/css/hub.css">

<style>

/* PLAYER SPACE */

.main{
padding-bottom:150px;
}

/* CARD ANIMATION */

.story-item.playing{
background:#f1f5f9;
border-left:4px solid #2563eb;
}

/* PROGRESS BAR CARD */

.card-progress{
position:absolute;
bottom:0;
left:0;
height:3px;
background:#38bdf8;
width:0%;
transition:width .2s linear;
}

</style>

</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div class="page-title">

<h1 class="d-flex align-items-center gap-2">

FABULARIUM
<a href="memo.html">
<i class="bi bi-house-fill"></i>
</a>

</h1>

<p><strong>Biblioteca de Histórias, Ciência e Imaginação</strong></p>

</div>


<!-- HISTÓRIA -->

<div class="story-item cat-astronomia"
data-audio="fabularium/audios/james-webb-e-as-lrd.mp3"
data-icon="bi-moon-stars"
style="position:relative">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-astronomia">
ASTRONOMIA
</div>

<div class="story-title">
James Webb e as Little Red Dots
</div>

<div class="story-meta">
Cosmologia e Astronomia
</div>

</div>

<div class="card-progress"></div>

</div>


</main>


<script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/components.js"></script>

<script>

/* FABULARIUM ENGINE */

const cards = document.querySelectorAll(".story-item")
const audio = document.getElementById("audioControl")

let playlist=[]
let currentIndex=-1

cards.forEach((card,index)=>{

playlist.push(card)

card.addEventListener("click",()=>{

currentIndex=index
playCard(card)

})

})

function playCard(card){

const src=card.dataset.audio

if(!src) return

audio.src=src
audio.play()

cards.forEach(c=>c.classList.remove("playing"))
card.classList.add("playing")

}

/* NEXT PREVIOUS */

const nextBtn=document.getElementById("nextBtn")
const prevBtn=document.getElementById("prevBtn")

if(nextBtn){

nextBtn.onclick=()=>{

if(currentIndex<playlist.length-1){

currentIndex++
playCard(playlist[currentIndex])

}

}

}

if(prevBtn){

prevBtn.onclick=()=>{

if(currentIndex>0){

currentIndex--
playCard(playlist[currentIndex])

}

}

}

/* AUTO NEXT */

audio.addEventListener("ended",()=>{

if(currentIndex<playlist.length-1){

currentIndex++
playCard(playlist[currentIndex])

}

})

/* CARD PROGRESS */

audio.addEventListener("timeupdate",()=>{

if(currentIndex===-1) return

const progress=(audio.currentTime/audio.duration)*100

const card=playlist[currentIndex]
const bar=card.querySelector(".card-progress")

if(bar){

bar.style.width=progress+"%"

}

})

</script>

</body>
</html>
