<div class="fabularium-app">

<style>

/* container */

.fabularium-app{
background:#0f172a;
color:white;
padding:20px;
border-radius:16px;
font-family:Arial;
}

/* header */

.fab-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.fab-title{
font-size:22px;
font-weight:bold;
}

/* busca */

.fab-search{
background:#1e293b;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
}

/* seção */

.fab-section{
margin-bottom:28px;
}

.fab-section h2{
margin-bottom:12px;
}

/* carrossel */

.fab-carousel{
display:flex;
gap:14px;
overflow:auto;
scroll-behavior:smooth;
padding-bottom:6px;
}

/* card */

.fab-card{
min-width:170px;
cursor:pointer;
}

.fab-cover{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
transition:.3s;
}

.fab-card:hover .fab-cover{
transform:scale(1.05);
}

.fab-name{
margin-top:6px;
font-size:14px;
}

/* favoritos */

.fab-fav{
font-size:18px;
cursor:pointer;
}

/* player */

.fab-player{

position:sticky;
bottom:0;
background:#020617;

display:flex;
align-items:center;
gap:12px;

padding:10px;
border-radius:12px;

margin-top:20px;

}

.fab-player img{
width:48px;
height:48px;
border-radius:8px;
}

/* info */

.fab-info{
flex:1;
}

.fab-progress{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:6px;
cursor:pointer;
}

.fab-progress-bar{
height:100%;
width:0%;
background:#6366f1;
}

/* controles */

.fab-controls{
display:flex;
gap:8px;
}

.fab-btn{
background:#1e293b;
border:none;
color:white;
width:36px;
height:36px;
border-radius:8px;
font-size:16px;
}

/* animação */

.playing{
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}

}

/* responsivo */

@media(max-width:700px){

.fab-card{
min-width:140px;
}

.fab-cover{
height:100px;
}

}

</style>


<!-- HEADER -->

<div class="fab-header">

<div class="fab-title">
🌌 Fabularium
</div>

<input class="fab-search" id="fabSearch" placeholder="Buscar história">

</div>


<!-- RECOMENDADOS -->

<div class="fab-section">

<h2>⭐ Recomendados</h2>

<div class="fab-carousel">

<div class="fab-card"
data-cat="astronomia"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<img class="fab-cover"
src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<div class="fab-name">
Viagem pelas estrelas
</div>

</div>

</div>

</div>


<!-- ASTRONOMIA -->

<div class="fab-section">

<h2>🌌 Astronomia</h2>

<div class="fab-carousel">

<div class="fab-card"
data-cat="astronomia"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<img class="fab-cover"
src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">

<div class="fab-name">
Viagem pelas estrelas
</div>

</div>

</div>

<!-- BIOLOGIA -->

<div class="fab-section">

<h2>🌱 Biologia</h2>

<div class="fab-carousel">

<div class="fab-card"
data-cat="biologia"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-cover="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">

<img class="fab-cover"
src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">

<div class="fab-name">
A floresta viva
</div>

</div>

<!-- PLAYER -->

<div class="fab-player">

<img id="fabCover">

<div class="fab-info">

<div id="fabTitle">
Selecione uma história
</div>

<div class="fab-progress" id="fabProgress">

<div class="fab-progress-bar" id="fabBar"></div>

</div>

</div>

<div class="fab-controls">

<button class="fab-btn" id="fabPrev">
⏮
</button>

<button class="fab-btn" id="fabPlay">
▶
</button>

<button class="fab-btn" id="fabNext">
⏭
</button>

</div>

<audio id="fabAudio"></audio>

</div>


<script>

const cards=[...document.querySelectorAll(".fab-card")];

const audio=document.getElementById("fabAudio");

const title=document.getElementById("fabTitle");
const cover=document.getElementById("fabCover");

const play=document.getElementById("fabPlay");

const next=document.getElementById("fabNext");
const prev=document.getElementById("fabPrev");

const bar=document.getElementById("fabBar");
const progress=document.getElementById("fabProgress");

let index=-1;


/* carregar */

function load(i){

const c=cards[i];

audio.src=c.dataset.audio;

title.textContent=c.innerText;

cover.src=c.dataset.cover;

index=i;

audio.play();

play.innerHTML="⏸";

play.classList.add("playing");

localStorage.setItem("fab_last",i);

}

/* clique */

cards.forEach((c,i)=>{

c.onclick=()=>load(i);

});

/* play pause */

play.onclick=()=>{

if(audio.paused){

audio.play();
play.innerHTML="⏸";
play.classList.add("playing");

}else{

audio.pause();
play.innerHTML="▶";
play.classList.remove("playing");

}

};

/* próxima */

next.onclick=()=>{

let n=index+1;

if(n>=cards.length)n=0;

load(n);

};

/* anterior */

prev.onclick=()=>{

let p=index-1;

if(p<0)p=cards.length-1;

load(p);

};

/* autoplay */

audio.onended=()=>next.onclick();

/* progresso */

audio.ontimeupdate=()=>{

let p=(audio.currentTime/audio.duration)*100;

bar.style.width=p+"%";

};

/* seek */

progress.onclick=e=>{

let w=progress.clientWidth;

audio.currentTime=(e.offsetX/w)*audio.duration;

};

/* memória */

window.onload=()=>{

let last=localStorage.getItem("fab_last");

if(last)load(last);

};

</script>

</div>
