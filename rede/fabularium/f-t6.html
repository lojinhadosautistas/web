<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fabularium | Biblioteca de Histórias</title>

<base href="../">

<link rel="icon" href="../assets/img/favicon.png">

<link rel="stylesheet" href="../assets/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/vendor/bootstrap-icons/bootstrap-icons.css">
<link rel="stylesheet" href="../assets/css/hub.css">

<style>

.main{
padding-bottom:160px;
}

/* BIBLIOTECA */

.fabularium-library{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

.story-item{
display:flex;
align-items:center;
gap:16px;
background:#fff;
padding:14px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.story-icon{
width:54px;
height:54px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
flex-shrink:0;
}

.icon-nerd{
background:#ede9fe;
color:#6d28d9;
}

.icon-astronomia{
background:#dbeafe;
color:#1e3a8a;
}

.story-info{
flex:1;
}

.story-title{
font-weight:600;
font-size:15px;
}

.story-meta{
font-size:13px;
color:#64748b;
}

.play-btn{
border:none;
background:#2563eb;
color:#fff;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

/* PLAYER */

.audio-player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:10px 20px;
z-index:999;
}

.player-top{
display:flex;
align-items:center;
gap:14px;
}

.player-icon{
width:42px;
height:42px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#1e293b;
}

.player-info{
flex:1;
font-size:14px;
}

/* PROGRESSO */

.progress-container{
width:100%;
height:4px;
background:#334155;
margin-top:8px;
border-radius:2px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
}

/* ANIMAÇÃO SONORA */

.sound-wave{
display:flex;
gap:3px;
margin-left:6px;
}

.sound-wave span{
width:3px;
height:8px;
background:#22c55e;
animation:sound 1s infinite;
}

.sound-wave span:nth-child(2){animation-delay:.2s}
.sound-wave span:nth-child(3){animation-delay:.4s}

@keyframes sound{

0%{height:4px}
50%{height:14px}
100%{height:4px}

}

</style>

</head>

<body>

<main class="main">

<h1>FABULARIUM</h1>

<div class="fabularium-library">

<!-- HISTÓRIA 1 -->

<div class="story-item"
data-audio="https://drive.google.com/uc?export=open&id=19ykUjtl-IYMFW5p2DewNcLfv2Rkv34Jc"
data-icon="bi-film">

<div class="story-icon icon-nerd">
<i class="bi bi-film"></i>
</div>

<div class="story-info">

<div class="story-title">
Batman (1989) — Coringa no Museu
</div>

<div class="story-meta">
Aventuras do Mundo Nerd
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>


<!-- HISTÓRIA 2 -->

<div class="story-item"
data-audio="https://drive.google.com/uc?export=open&id=11WfJfg8sEgH1_xrQV2JsL1fdQqejTmjl"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="story-title">
Missão Espacial rumo ao Sol
</div>

<div class="story-meta">
Cosmologia e Astronomia
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>


<!-- HISTÓRIA 3 -->

<div class="story-item"
data-audio="https://drive.google.com/uc?export=open&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="story-title">
Sagitarius A* — o buraco negro
</div>

<div class="story-meta">
Cosmologia e Astronomia
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>

</div>

</main>


<!-- PLAYER -->

<div class="audio-player">

<div class="player-top">

<div id="playerIcon" class="player-icon">
<i class="bi bi-music-note"></i>
</div>

<div class="player-info">
<div id="playerTitle">Selecione uma história</div>
</div>

<audio id="audioControl"></audio>

</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>


<script>

const items = document.querySelectorAll(".story-item");
const audio = document.getElementById("audioControl");
const title = document.getElementById("playerTitle");
const icon = document.getElementById("playerIcon");
const progress = document.getElementById("progressBar");

let currentIndex = -1;

/* PLAY */

items.forEach((item,index)=>{

const btn = item.querySelector(".play-btn");

btn.addEventListener("click",(e)=>{

e.stopPropagation();

if(currentIndex === index && !audio.paused){

audio.pause();

}else{

playStory(index);

}

});

});

/* FUNÇÃO PLAY */

function playStory(index){

const item = items[index];

const src = item.dataset.audio;
const storyTitle = item.querySelector(".story-title").innerText;
const iconClass = item.dataset.icon;

audio.src = src;
audio.play();

title.textContent = storyTitle;

icon.innerHTML = `<i class="bi ${iconClass}"></i>
<div class="sound-wave">
<span></span><span></span><span></span>
</div>`;

currentIndex = index;

updateButtons();

}

/* BOTÕES */

function updateButtons(){

items.forEach((item,i)=>{

const btn = item.querySelector(".play-btn");

btn.innerHTML =
(i === currentIndex && !audio.paused)
? `<i class="bi bi-pause-fill"></i>`
: `<i class="bi bi-play-fill"></i>`;

});

}

/* PROGRESSO */

audio.addEventListener("timeupdate",()=>{

const percent = (audio.currentTime / audio.duration) * 100;

progress.style.width = percent + "%";

});

/* AUTOPLAY */

audio.addEventListener("ended",()=>{

let next = currentIndex + 1;

if(next < items.length){

playStory(next);

}

});

audio.addEventListener("pause",updateButtons);
audio.addEventListener("play",updateButtons);

</script>

</body>
</html>
