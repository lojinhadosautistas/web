<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fabularium | Biblioteca de Histórias</title>

<meta name="description" content="Fabularium é uma biblioteca de histórias narradas para Rafael."/>

<base href="../">

<link rel="icon" href="../assets/img/favicon.png">

<link rel="stylesheet" href="../assets/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/vendor/bootstrap-icons/bootstrap-icons.css">

<link rel="stylesheet" href="../assets/css/hub.css">

<style>

/* espaço para player */

.main{
padding-bottom:140px;
}

/* BIBLIOTECA */

.fabularium-library{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

/* CARD */

.story-item{
display:flex;
align-items:center;
gap:16px;
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
cursor:pointer;
transition:.25s;
}

.story-item:hover{
transform:translateY(-3px);
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

/* CATEGORIAS */

.cat-nerd{
border-left:5px solid #7c3aed;
background:linear-gradient(to right,#f5f3ff,#ffffff);
}

.cat-astronomia{
border-left:5px solid #2563eb;
background:linear-gradient(to right,#eff6ff,#ffffff);
}

.cat-ciencia{
border-left:5px solid #16a34a;
background:linear-gradient(to right,#ecfdf5,#ffffff);
}

/* ÍCONES */

.story-icon{
width:54px;
height:54px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
flex-shrink:0;
}

.icon-nerd{
background:#ede9fe;
color:#6d28d9;
}

.icon-astronomia{
background:#dbeafe;
color:#1e3a8a;
}

/* INFO */

.story-info{
flex:1;
}

.story-title{
font-weight:600;
font-size:15px;
}

/* BADGE */

.badge-cat{

display:inline-block;
font-size:11px;
padding:3px 8px;
border-radius:6px;
margin-bottom:4px;
font-weight:600;

}

.badge-nerd{
background:#ede9fe;
color:#6d28d9;
}

.badge-astronomia{
background:#dbeafe;
color:#1e3a8a;
}

/* PLAY */

.play-btn{
border:none;
background:#2563eb;
color:#fff;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* PLAYER */

.audio-player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f172a;
color:white;
display:flex;
align-items:center;
gap:16px;
padding:12px 20px;
z-index:999;
}

.player-icon{
width:42px;
height:42px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#1e293b;
}

.player-info{
flex:1;
font-size:14px;
}

audio{
height:34px;
}

</style>

</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<h1 class="mb-4">FABULARIUM</h1>

<div class="fabularium-library">

<!-- HISTORIA 1 -->

<div class="story-item cat-nerd"
data-audio="audios/A-historia-da-pixacao-do-batmovel_Mundo-NERD.mp3"
data-icon="bi-film">

<div class="story-icon icon-nerd">
<i class="bi bi-film"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-nerd">
MUNDO NERD
</div>

<div class="story-title">
A história da pixação do batmóvel
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>

<!-- HISTORIA 2 -->

<div class="story-item cat-astronomia"
data-audio="audios/As-Aventuras-do-James-Webb-as-amigas-little-red-dots_Cosmologia-e-Astronomia.mp3"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-astronomia">
ASTRONOMIA
</div>

<div class="story-title">
As Aventuras do James Webb e as amigas Little Red Dots
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>

<!-- HISTORIA 3 -->

<div class="story-item cat-astronomia"
data-audio="audios/As-Aventuras-do-James-Webb-e-sua-amiga-little-red-dots-no-universo-cangaceiro_Cosmologia-e-Astronomia.mp3"
data-icon="bi-moon-stars">

<div class="story-icon icon-astronomia">
<i class="bi bi-moon-stars"></i>
</div>

<div class="story-info">

<div class="badge-cat badge-astronomia">
ASTRONOMIA
</div>

<div class="story-title">
Little Red Dots no universo cangaceiro
</div>

</div>

<button class="play-btn">
<i class="bi bi-play-fill"></i>
</button>

</div>

</div>

</main>

<!-- PLAYER -->

<div class="audio-player">

<div id="playerIcon" class="player-icon">
<i class="bi bi-music-note"></i>
</div>

<div class="player-info">
<div id="playerTitle">Selecione uma história</div>
</div>

<audio id="audioControl" controls></audio>

</div>

<script>

const items = document.querySelectorAll(".story-item");
const audio = document.getElementById("audioControl");
const title = document.getElementById("playerTitle");
const icon = document.getElementById("playerIcon");

items.forEach(item=>{

item.addEventListener("click",()=>{

const src = item.dataset.audio;
const storyTitle = item.querySelector(".story-title").innerText;
const iconClass = item.dataset.icon;

audio.src = src;
audio.load();
audio.play();

title.textContent = storyTitle;

icon.innerHTML = `<i class="bi ${iconClass}"></i>`;

});

});

</script>

</body>
</html>
