<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Fabularium Player</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

/* lista */

.story-list{
max-width:600px;
margin:auto;
}

.story-item{
padding:14px;
border-radius:10px;
background:#1e293b;
margin-bottom:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:12px;
}

.story-item:hover{
background:#334155;
}

.story-item.active{
background:#6366f1;
}

/* player */

.audio-player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
padding:14px;
display:flex;
align-items:center;
gap:14px;
}

/* ícone */

.player-icon{
font-size:26px;
width:42px;
text-align:center;
}

/* info */

.player-info{
flex:1;
}

/* barra progresso */

.progress{
height:6px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
cursor:pointer;
margin-top:6px;
}

.progress-bar{
height:100%;
width:0%;
background:#6366f1;
}

/* controles */

.player-controls{
display:flex;
gap:10px;
}

.control-btn{
background:#1e293b;
border:none;
color:white;
width:38px;
height:38px;
border-radius:10px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
}

.control-btn:hover{
background:#334155;
}

/* botão animado */

.playing{
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}

}

/* visualizador */

.visualizer{
display:flex;
gap:3px;
align-items:flex-end;
height:18px;
margin-top:4px;
}

.bar{
width:3px;
background:#6366f1;
height:4px;
animation:equalize 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}

@keyframes equalize{

0%{height:4px}
50%{height:16px}
100%{height:4px}

}

</style>
</head>
<body>

<div class="story-list">

<div class="story-item"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-icon="bi-stars">

<i class="bi bi-stars"></i>
<div class="story-title">Viagem pelas estrelas</div>

</div>

<div class="story-item"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-icon="bi-globe">

<i class="bi bi-globe"></i>
<div class="story-title">A Terra e seus oceanos</div>

</div>

<div class="story-item"
data-audio="https://drive.google.com/uc?export=download&id=1Fezp65OBc_gq3j12ERWc0_26Kb9CcTkW"
data-icon="bi-lightning">

<i class="bi bi-lightning"></i>
<div class="story-title">O poder da eletricidade</div>

</div>

</div>

<!-- PLAYER -->

<div class="audio-player">

<div id="playerIcon" class="player-icon">
<i class="bi bi-music-note"></i>
</div>

<div class="player-info">

<div id="playerTitle">
Selecione uma história
</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="progress" id="progress">

<div class="progress-bar" id="progressBar"></div>

</div>

<div id="playerTime" style="font-size:12px;opacity:.7;">
00:00
</div>

</div>

<div class="player-controls">

<button id="prevBtn" class="control-btn">
<i class="bi bi-skip-start-fill"></i>
</button>

<button id="playPauseBtn" class="control-btn">
<i class="bi bi-play-fill"></i>
</button>

<button id="nextBtn" class="control-btn">
<i class="bi bi-skip-end-fill"></i>
</button>

</div>

<audio id="audioControl"></audio>

</div>

<script>

const items=document.querySelectorAll(".story-item");

const audio=document.getElementById("audioControl");
const title=document.getElementById("playerTitle");
const icon=document.getElementById("playerIcon");

const progress=document.getElementById("progress");
const progressBar=document.getElementById("progressBar");

const playPauseBtn=document.getElementById("playPauseBtn");

const nextBtn=document.getElementById("nextBtn");
const prevBtn=document.getElementById("prevBtn");

const timeDisplay=document.getElementById("playerTime");

let currentIndex=-1;

/* carregar */

function loadStory(index){

items.forEach(i=>i.classList.remove("active"));

const item=items[index];

item.classList.add("active");

const src=item.dataset.audio;
const storyTitle=item.querySelector(".story-title").innerText;
const iconClass=item.dataset.icon;

audio.src=src;

title.textContent=storyTitle;

icon.innerHTML=`<i class="bi ${iconClass}"></i>`;

currentIndex=index;

localStorage.setItem("fabularium_index",index);

audio.play();

playPauseBtn.innerHTML=`<i class="bi bi-pause-fill"></i>`;

playPauseBtn.classList.add("playing");

}

/* clique */

items.forEach((item,index)=>{

item.addEventListener("click",()=>{

loadStory(index);

});

});

/* play pause */

playPauseBtn.addEventListener("click",()=>{

if(audio.paused){

audio.play();
playPauseBtn.innerHTML=`<i class="bi bi-pause-fill"></i>`;
playPauseBtn.classList.add("playing");

}else{

audio.pause();
playPauseBtn.innerHTML=`<i class="bi bi-play-fill"></i>`;
playPauseBtn.classList.remove("playing");

}

});

/* próxima */

nextBtn.addEventListener("click",()=>{

let next=currentIndex+1;

if(next>=items.length)next=0;

loadStory(next);

});

/* anterior */

prevBtn.addEventListener("click",()=>{

let prev=currentIndex-1;

if(prev<0)prev=items.length-1;

loadStory(prev);

});

/* autoplay */

audio.addEventListener("ended",()=>{

let next=currentIndex+1;

if(next>=items.length)next=0;

loadStory(next);

});

/* progresso */

audio.addEventListener("timeupdate",()=>{

const percent=(audio.currentTime/audio.duration)*100;

progressBar.style.width=percent+"%";

const remaining=audio.duration-audio.currentTime;

if(!isNaN(remaining)){

const m=Math.floor(remaining/60);
const s=Math.floor(remaining%60);

timeDisplay.textContent=`-${m}:${s.toString().padStart(2,'0')}`;

}

});

/* clicar barra */

progress.addEventListener("click",(e)=>{

const width=progress.clientWidth;

const clickX=e.offsetX;

audio.currentTime=(clickX/width)*audio.duration;

});

/* memória */

window.addEventListener("load",()=>{

const saved=localStorage.getItem("fabularium_index");

if(saved){

loadStory(saved);

}

});

</script>

</body>
</html>
