<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Atlas Cognitivo - Navegando na Tempestade | Sistema REDE</title>
<meta name="description" content="Mapa interativo dos 4 eixos de desenvolvimento com experiência guiada."/>

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"/>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f7fb;
}

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.region-item:hover{ background:#eef2ff; }

.region-active{
  background:#dbeafe;
  font-weight:600;
}

.brain-wrapper{
  position:relative;
  max-width:560px;
  margin:auto;
}

.brain-img{
  width:100%;
  border-radius:14px;
}

.brain-hotspot{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  transition:.25s;
  background:rgba(37,99,235,.15);
  border:2px solid rgba(37,99,235,.45);
}

.brain-hotspot:hover{
  transform:scale(1.08);
  box-shadow:0 0 12px rgba(37,99,235,.35);
}

.brain-hotspot.active{
  background:rgba(37,99,235,.35);
  border-color:#2563eb;
  transform:scale(1.18);
}

.brain-hotspot.audio-glow{
  animation:audioPulse 1.2s infinite;
}

@keyframes audioPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2); box-shadow:0 0 22px rgba(37,99,235,.55);}
  100%{transform:scale(1);}
}

/* hotspots corretos */
#terapeutico{ top:18%; left:14%; width:78px; height:78px; }
#familiar{ top:28%; left:68%; width:72px; height:72px; }
#ambiental{ top:62%; left:18%; width:78px; height:78px; }
#biologico{ top:65%; left:68%; width:72px; height:72px; }

.story-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  background:#f8fafc;
  margin-top:10px;
}

.play-btn{
  border:none;
  background:#2563eb;
  color:#fff;
  width:36px;
  height:36px;
  border-radius:50%;
}

.fabularium-library{
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

audio{
  width:100%;
  position:fixed;
  bottom:0;
  left:0;
  z-index:999;
}
</style>
</head>
<body>

<div class="container py-4">

<h1>Atlas Cognitivo 🧠 Navegando na Tempestade</h1>

<div class="row g-4">

<div class="col-lg-3">

<div class="cardx">
<h5>Eixos</h5>

<div class="region-item" data-id="terapeutico">🧠 Terapêutico</div>
<div class="region-item" data-id="familiar">👨‍👩‍👦 Familiar</div>
<div class="region-item" data-id="ambiental">🏠 Ambiental</div>
<div class="region-item" data-id="biologico">💊 Biológico</div>
</div>

</div>

<div class="col-lg-6">

<div class="cardx" id="painel">
<h5>Eixo selecionado</h5>
<p>Selecione um eixo.</p>
</div>

<div class="cardx">
<div class="brain-wrapper">

<img src="../assets/img/prisma-4-eixos_bg.png" class="brain-img">

<div id="terapeutico" class="brain-hotspot"></div>
<div id="familiar" class="brain-hotspot"></div>
<div id="ambiental" class="brain-hotspot"></div>
<div id="biologico" class="brain-hotspot"></div>

</div>
</div>

</div>

<div class="col-lg-3">
<div class="cardx">
<h5>Audioteca</h5>
<div id="fabulariumLibrary" class="fabularium-library"></div>
</div>
</div>

</div>
</div>

<audio id="audioControl" controls></audio>

<script>
const regioes = {
  terapeutico:{ titulo:"Eixo Terapêutico" },
  familiar:{ titulo:"Eixo Familiar" },
  ambiental:{ titulo:"Eixo Ambiental" },
  biologico:{ titulo:"Eixo Biológico" }
};

const AUDIO_MAP = {
  geral:"audios/atlascognitivo_geral.mp3",
  terapeutico:"audios/atlascognitivo_terapeutico.mp3",
  familiar:"audios/atlascognitivo_emocional.mp3",
  ambiental:"audios/atlascognitivo_ambiental.mp3",
  biologico:"audios/atlascognitivo_biologico.mp3"
};

function updatePanel(id){
  const r = regioes[id];

  document.getElementById("painel").innerHTML = `
    <h5>${r.titulo}</h5>
    <div class="story-item" onclick="playRegionAudio('${id}')">
      <i class="bi bi-play-circle"></i>
      <strong>Audioguia do eixo</strong>
    </div>
  `;
}

function syncRegion(id){
  document.querySelectorAll('.brain-hotspot')
    .forEach(el=>el.classList.remove('active','audio-glow'));

  document.querySelectorAll('.region-item')
    .forEach(el=>el.classList.remove('region-active'));

  document.getElementById(id)?.classList.add('active','audio-glow');
  document.querySelector('[data-id="'+id+'"]')
    ?.classList.add('region-active');

  updatePanel(id);
}

function playRegionAudio(regionId){
  const audio = document.getElementById("audioControl");
  const src = AUDIO_MAP[regionId];
  if(!src) return;

  audio.src = src;
  audio.load();
  audio.play();

  syncRegion(regionId);
}

function renderPlaylist(){
  const container = document.getElementById("fabulariumLibrary");
  container.innerHTML = "";

  Object.entries(regioes).forEach(([key,r])=>{
    const item = document.createElement("div");
    item.className = "story-item";

    item.innerHTML = `
      <div>${r.titulo}</div>
      <button class="play-btn">▶</button>
    `;

    item.querySelector(".play-btn")
      .addEventListener("click",()=>playRegionAudio(key));

    container.appendChild(item);
  });
}

document.querySelectorAll('.brain-hotspot').forEach(el=>{
  el.addEventListener('click',()=>{
    syncRegion(el.id);
    playRegionAudio(el.id);
  });
});

document.querySelectorAll('.region-item').forEach(el=>{
  el.addEventListener('click',()=>{
    syncRegion(el.dataset.id);
    playRegionAudio(el.dataset.id);
  });
});

renderPlaylist();
</script>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
GLightbox({
  touchNavigation:true,
  loop:false,
  zoomable:true
});
</script>

</body>
</html>
