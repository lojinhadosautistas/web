<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa da Nossa Mente | Lojinha dos Autistas</title>

<meta name="description" content="Mapa interativo e experiência guiada sobre o funcionamento do cérebro no autismo."/>

<link href="../assets/img/favicon.png" rel="icon">

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>

body{
  font-family: 'Inter', sans-serif;
  background:#f5f7fb;
}

.cardx{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.region-item:hover{
  background:#eef2ff;
}

.region-active{
  background:#dbeafe;
}

.brain-container{
  text-align:center;
}

.brain-area{
  cursor:pointer;
  transition:.2s;
}

.brain-area:hover{
  opacity:0.85;
}

.tag{
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
  margin-right:5px;
}

.tag-blue{ background:#dbeafe; color:#1d4ed8; }
.tag-green{ background:#dcfce7; color:#166534; }
.tag-yellow{ background:#fef9c3; color:#854d0e; }

</style>

</head>

<body>

<div class="container py-4">

<h2>🧠 Mapa da Nossa Mente</h2>
<p class="text-muted">Uma explicação simples e profunda sobre o autismo</p>

<!-- MODO GUIADO -->
<div class="cardx mb-3" style="background:#ecfeff">

<b>Modo explicação guiada</b><br>
<span class="text-muted">Uma leitura pensada para mães</span>

<br><br>

<button class="btn btn-primary btn-sm" onclick="startTour()">▶️ Iniciar</button>

</div>

<div class="row g-4">

<!-- ESQUERDA -->
<div class="col-lg-3">

<div class="cardx">
<h5>Regiões</h5>

<div class="region-item" data-id="prefrontal">🔴 Pré-frontal</div>
<div class="region-item" data-id="parietal">🟠 Parietal</div>
<div class="region-item" data-id="temporal">🔵 Temporal</div>
<div class="region-item" data-id="occipital">🟢 Occipital</div>
<div class="region-item" data-id="cerebelo">🟣 Cerebelo</div>
<div class="region-item" data-id="limbico">🟡 Límbico</div>
<div class="region-item" data-id="insula">🔷 Ínsula</div>

</div>

</div>

<!-- CENTRO -->
<div class="col-lg-6">

<div class="cardx brain-container">

<svg viewBox="0 0 500 400" width="100%">

<path class="brain-area" data-id="prefrontal" fill="#ef4444" d="M100 100 L200 80 L220 140 L140 160 Z"/>
<path class="brain-area" data-id="parietal" fill="#f97316" d="M200 80 L320 100 L300 170 L220 140 Z"/>
<path class="brain-area" data-id="temporal" fill="#3b82f6" d="M200 180 L300 170 L280 260 L180 250 Z"/>
<path class="brain-area" data-id="occipital" fill="#22c55e" d="M320 100 L380 160 L340 200 L300 170 Z"/>
<path class="brain-area" data-id="cerebelo" fill="#7c3aed" d="M300 260 L380 240 L360 300 L280 260 Z"/>
<path class="brain-area" data-id="limbico" fill="#eab308" d="M220 140 L300 170 L260 200 L200 180 Z"/>
<path class="brain-area" data-id="insula" fill="#06b6d4" d="M230 160 L260 150 L250 180 L220 180 Z"/>

</svg>

</div>

</div>

<!-- DIREITA -->
<div class="col-lg-3">

<div class="cardx" id="painel">
Clique em uma região ou inicie a explicação guiada
</div>

</div>

</div>

</div>

<script>

const regioes = {
prefrontal:{titulo:"Córtex Pré-frontal"},
parietal:{titulo:"Córtex Parietal"},
temporal:{titulo:"Córtex Temporal"},
occipital:{titulo:"Córtex Occipital"},
cerebelo:{titulo:"Cerebelo"},
limbico:{titulo:"Sistema Límbico"},
insula:{titulo:"Ínsula"}
};

// EXPERIÊNCIA EMOCIONAL
const tour = [

{
id:"parietal",
texto:`<b>Manhã.</b><br><br>
Barulho, luz, roupa... tudo ao mesmo tempo.<br><br>
💙 Isso é sobrecarga sensorial.`
},

{
id:"prefrontal",
texto:`Você pede algo simples... e ele trava.<br><br>
💙 Não é desobediência — é dificuldade de organização.`
},

{
id:"temporal",
texto:`Você explica... mas não chega.<br><br>
💙 O processamento da linguagem é diferente.`
},

{
id:"limbico",
texto:`A crise vem.<br><br>
💙 Não começou agora — só apareceu agora.`
},

{
id:"insula",
texto:`Depois vem o cansaço.<br><br>
💙 O corpo sente antes da palavra.`
},

{
id:"occipital",
texto:`Uma imagem ajuda mais que mil palavras.<br><br>
💙 O visual organiza.`
},

{
id:"cerebelo",
texto:`Pequenas dificuldades acumulam.<br><br>
💙 O desgaste é invisível.`
},

{
id:"prefrontal",
texto:`💙 Não é falta de limite.<br>
É um cérebro diferente.<br><br>
E precisa de compreensão.`
}

];

let tourStep = 0;

function startTour(){
  tourStep = 0;
  runTourStep();
}

function nextStep(){
  tourStep++;
  if(tourStep < tour.length){
    runTourStep();
  }
}

function prevStep(){
  tourStep--;
  if(tourStep >= 0){
    runTourStep();
  }
}

function runTourStep(){

let etapa = tour[tourStep];

selectRegion(etapa.id);

document.getElementById("painel").innerHTML = `
<h5>${regioes[etapa.id].titulo}</h5>

<div style="background:#fff7ed;padding:12px;border-radius:10px;">
${etapa.texto}
</div>

<br>

<div>
<span class="tag tag-blue">Tradução</span>
<span class="tag tag-green">Neuro</span>
<span class="tag tag-yellow">Estratégia</span>
</div>

<br>

<button class="btn btn-sm btn-outline-secondary" onclick="prevStep()">←</button>
<button class="btn btn-sm btn-primary" onclick="nextStep()">→</button>
`;

}

// INTERAÇÃO NORMAL
function selectRegion(id){

document.querySelectorAll('.region-item').forEach(el=>{
el.classList.remove('region-active');
if(el.dataset.id===id) el.classList.add('region-active');
});

}

document.querySelectorAll('.region-item').forEach(el=>{
el.onclick = ()=> selectRegion(el.dataset.id);
});

document.querySelectorAll('.brain-area').forEach(el=>{
el.onclick = ()=> selectRegion(el.dataset.id);
});

</script>

</body>
</html>
