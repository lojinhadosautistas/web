<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa do Autismo no Brasil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  font-family: Inter, sans-serif;
  background:#f5f7fb;
}

.hero{
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:50px;
  border-radius:16px;
}

.cardx{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

#map{
  height:600px;
  border-radius:14px;
}

.section{ margin-top:30px; }

.kpi h2{
  color:#2563eb;
  font-weight:700;
}

select{
  border-radius:8px;
  padding:6px;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="hero">
<h1>Mapa do Autismo no Brasil</h1>
<p>Baseado no Censo 2022 do IBGE</p>
</div>

<!-- KPIs -->
<div class="section row g-3">

<div class="col-lg-3"><div class="cardx text-center">
<h2>2,4M</h2><p>Pessoas com autismo</p>
</div></div>

<div class="col-lg-3"><div class="cardx text-center">
<h2>1,2%</h2><p>Prevalência</p>
</div></div>

<div class="col-lg-3"><div class="cardx text-center">
<h2>760 mil</h2><p>Estudantes</p>
</div></div>

<div class="col-lg-3"><div class="cardx text-center">
<h2>66,8%</h2><p>Ensino fundamental</p>
</div></div>

</div>

<!-- FILTRO -->
<div class="section cardx">
<label><b>Visualizar por:</b></label>
<select id="filtro">
<option value="pop">População estimada</option>
<option value="prev">Prevalência (%)</option>
</select>
</div>

<!-- MAPA -->
<div class="section">
<div id="map"></div>
</div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([-14.2, -51.9], 4);

// BASE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DADOS SIMPLIFICADOS (exemplo inicial)
var dados = {
  "SP": {pop: 500000, prev:1.2},
  "MG": {pop: 250000, prev:1.2},
  "RJ": {pop: 200000, prev:1.2},
  "CE": {pop: 120000, prev:1.2},
  "BA": {pop: 180000, prev:1.2},
  "RS": {pop: 130000, prev:1.2},
  "PR": {pop: 140000, prev:1.2},
  "SC": {pop: 80000, prev:1.2},
  "AM": {pop: 60000, prev:1.2},
  "DF": {pop: 50000, prev:1.1}
};

// ESCALA DE COR
function getColor(value){
  return value > 400000 ? "#08306b" :
         value > 200000 ? "#2171b5" :
         value > 100000 ? "#4292c6" :
         value > 50000 ? "#6baed6" :
                         "#9ecae1";
}

// ESTILO
function style(feature){
  var uf = feature.properties.sigla;
  var tipo = document.getElementById("filtro").value;
  var valor = dados[uf] ? dados[uf][tipo] : 0;

  return {
    fillColor: getColor(valor),
    weight: 1,
    color: "#fff",
    fillOpacity: 0.8
  };
}

// INTERAÇÃO
function onEachFeature(feature, layer){
  var uf = feature.properties.sigla;
  var dado = dados[uf];

  if(dado){
    layer.bindPopup(`
      <b>${feature.properties.nome}</b><br><br>
      Pessoas com autismo: ${dado.pop.toLocaleString()}<br>
      Prevalência: ${dado.prev}%<br><br>
      <small>Base IBGE 2022</small>
    `);
  }
}

// CARREGA GEOJSON
var geojson;

fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson")
.then(res=>res.json())
.then(data=>{
  geojson = L.geoJson(data, {
    style: style,
    onEachFeature: onEachFeature
  }).addTo(map);
});

// FILTRO DINÂMICO
document.getElementById("filtro").addEventListener("change", ()=>{
  geojson.setStyle(style);
});

</script>

</body>
</html>
