<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORÁCULO V9 — Calendário Clínico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#f4f6fb;}

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.metric{font-size:28px;font-weight:700;}

.low{color:#0f766e;}
.medium{color:#fbbf24;}
.high{color:#f97316;}
.critical{color:#ef4444;}

.flatpickr-day.low-day{background:#0f766e !important;color:#fff !important;border-radius:6px;}
.flatpickr-day.medium-day{background:#fbbf24 !important;color:#111 !important;border-radius:6px;}
.flatpickr-day.high-day{background:#f97316 !important;color:#fff !important;border-radius:6px;}
.flatpickr-day.critical-day{background:#ef4444 !important;color:#fff !important;border-radius:6px;}

/* 🌡️ MAPA MENSAL CLÍNICO */
.month-map{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day-box{
  background:#e5e7eb;
  border-radius:8px;
  padding:10px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.day-low{background:#0f766e;color:#fff;}
.day-medium{background:#fbbf24;color:#111;}
.day-high{background:#f97316;color:#fff;}
.day-critical{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<div class="container mt-4">

<h2>🧠 ORÁCULO V9 — Clima Emocional Clínico</h2>

<div class="row">
<div class="col-md-4"><div class="cardx"><h6>Risco Atual</h6><div id="riscoAtual" class="metric">--</div></div></div>
<div class="col-md-4"><div class="cardx"><h6>Tendência</h6><div id="tendencia" class="metric">--</div></div></div>
<div class="col-md-4"><div class="cardx"><h6>Probabilidade</h6><div id="probabilidade" class="metric">--</div></div></div>
</div>

<div class="cardx">
<h5>Registro Clínico</h5>
<input id="data" type="text" class="form-control mb-2" placeholder="Selecione a data" />
<input id="atividade" class="form-control mb-2" placeholder="Atividade" />
<select id="atencao" class="form-control mb-2"><option>baixa</option><option>media</option><option>boa</option></select>
<select id="conversacao" class="form-control mb-2"><option>nao</option><option>pouca</option><option>presente</option></select>
<select id="transicoes" class="form-control mb-2"><option>dificeis</option><option>ok</option><option>tranquilas</option></select>
<button class="btn btn-primary" onclick="APP.add()">Adicionar</button>
</div>

<div class="cardx"><canvas id="grafico"></canvas></div>

<!-- 🌡️ MAPA MENSAL -->
<div class="cardx">
<h5>🌡️ Mapa Mensal — Clima Emocional</h5>
<div id="monthlyMap" class="month-map"></div>
</div>

<div class="cardx">
<button class="btn btn-success" onclick="APP.sintese()">Gerar Síntese</button>
<pre id="sintese"></pre>
</div>

</div>

<script>
const STORAGE="oraculo_v9";

const ENGINE={
map(v,t){
const m={atencao:{baixa:1,media:2,boa:3},conversacao:{nao:1,pouca:2,presente:3},transicoes:{dificeis:1,ok:2,tranquilas:3}};
return m[t][v]||0;
},
risco(d){
let s=0;
s+=4-this.map(d.atencao,"atencao");
s+=4-this.map(d.conversacao,"conversacao");
s+=4-this.map(d.transicoes,"transicoes");
return Math.min(1,Math.max(0,s/9));
}
};

const APP={
dados:JSON.parse(localStorage.getItem(STORAGE)||"[]"),chart:null,
save(){localStorage.setItem(STORAGE,JSON.stringify(this.dados));},

add(){
this.dados.push({
  data:document.getElementById("data").value,
  atividade:document.getElementById("atividade").value,
  atencao:document.getElementById("atencao").value,
  conversacao:document.getElementById("conversacao").value,
  transicoes:document.getElementById("transicoes").value
});
this.save();this.update();this.refreshCalendar();
},

riskByDate(dateStr){
const list=this.dados.filter(d=>d.data===dateStr);
if(!list.length)return null;
return list.reduce((a,b)=>a+ENGINE.risco(b),0)/list.length;
},

update(){this.renderChart();this.updateDashboard();this.buildMonthlyMap();},

renderChart(){const ctx=document.getElementById("grafico").getContext("2d");if(this.chart)this.chart.destroy();this.chart=new Chart(ctx,{type:"line",data:{labels:this.dados.map(d=>d.data),datasets:[{label:"Risco",data:this.dados.map(d=>ENGINE.risco(d))}]}});},

updateDashboard(){if(!this.dados.length)return;const r=ENGINE.risco(this.dados.at(-1));document.getElementById("riscoAtual").innerText=(r*100).toFixed(0)+"%";},

buildMonthlyMap(){
const el=document.getElementById("monthlyMap");el.innerHTML="";
const today=new Date();const year=today.getFullYear();const month=today.getMonth();
const days=new Date(year,month+1,0).getDate();

for(let i=1;i<=days;i++){
const d=new Date(year,month,i).toISOString().split("T")[0];
const r=this.riskByDate(d);
const div=document.createElement("div");div.className="day-box";

div.innerText=i;

if(r!==null){
if(r<0.3)div.classList.add("day-low");
else if(r<0.6)div.classList.add("day-medium");
else if(r<0.8)div.classList.add("day-high");
else div.classList.add("day-critical");
}

el.appendChild(div);
}
},

refreshCalendar(){const el=document.getElementById("data");if(el._flatpickr)el._flatpickr.redraw();},

sintese(){const ult=this.dados.slice(-7);if(!ult.length){document.getElementById("sintese").innerText="Sem dados";return;}const m=ult.reduce((a,b)=>a+ENGINE.risco(b),0)/ult.length;let t="RISCO MÉDIO: "+(m*100).toFixed(1)+"%\n";t+=m>0.7?"ALTO":"OK";document.getElementById("sintese").innerText=t;}
};

APP.update();

flatpickr("#data",{
  dateFormat:"Y-m-d",
  allowInput:true,
  onDayCreate:function(_,__,fp,day){const iso=day.dateObj.toISOString().split("T")[0];const r=APP.riskByDate(iso);if(r===null)return;day.classList.add(r<0.3?"low-day":r<0.6?"medium-day":r<0.8?"high-day":"critical-day");}
});

</script>

</body>
</html>
