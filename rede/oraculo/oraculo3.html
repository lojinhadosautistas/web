<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORÁCULO | Sistema REDE</title>

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link href="../assets/css/hub.css" rel="stylesheet"/>

<style>
body{ background:#f5f7fb; }

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.region-item.active{
  background:#2563eb;
  color:#fff;
}

textarea{
  width:100%;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}

.btn-main{
  background:#2563eb;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="container mt-4">

<h2>🧠 ORÁCULO</h2>
<p class="text-muted">Suporte à decisão em contextos complexos</p>

<div class="row">

<!-- CONTEXTO -->
<div class="col-lg-3">
<div class="cardx">

<h5>🅾️ Contexto</h5>

<select id="contextTipo" class="form-control mb-2">
<option value="">Tipo</option>
<option>Evento</option>
<option>Escola</option>
<option>Rotina</option>
<option>Viagem</option>
</select>

<textarea id="contextDesc" placeholder="Descreva o contexto..."></textarea>

<select id="contextComplex" class="form-control">
<option value="">Complexidade</option>
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

<button class="btn btn-outline-primary btn-sm mt-2"
onclick="UI.sugerirEixos()">Sugerir Eixos</button>

</div>
</div>

<!-- EIXOS -->
<div class="col-lg-3">
<div class="cardx">

<h5>Eixos</h5>

<div class="region-item" onclick="ORACULO.toggleBloco('terapeutico')">🧠 Terapêutico</div>
<div class="region-item" onclick="ORACULO.toggleBloco('familiar')">👨‍👩‍👦 Familiar</div>
<div class="region-item" onclick="ORACULO.toggleBloco('ambiental')">🏠 Ambiental</div>
<div class="region-item" onclick="ORACULO.toggleBloco('biologico')">💊 Biológico</div>

</div>
</div>

<!-- PAINEL -->
<div class="col-lg-6">
<div class="cardx" id="painel">

<h5>Configuração</h5>
<p>Selecione um eixo</p>

</div>
</div>

</div>

<!-- OUTPUT -->
<div class="cardx mt-3">

<h5>Plano Programático</h5>

<button class="btn btn-main" onclick="ORACULO.exportarPP()">Gerar Plano</button>

<pre id="output" style="margin-top:15px;"></pre>

</div>

</main>

<script>

/* =====================
🧠 ENGINE (INTELIGÊNCIA LEVE)
===================== */

const ENGINE = {

sugerirEixos(contexto){

  const s = [];

  if(contexto.includes("evento") || contexto.includes("viagem")){
    s.push("ambiental","terapeutico");
  }

  if(contexto.includes("família") || contexto.includes("casa")){
    s.push("familiar");
  }

  if(contexto.includes("crise") || contexto.includes("sobrecarga")){
    s.push("biologico","terapeutico");
  }

  return [...new Set(s)];
},

sugerirCampos(id){

  const base = {

    terapeutico:{
      observar:"sinais de ansiedade e antecipação",
      ajustar:"uso de previsibilidade",
      evitar:"mudanças abruptas"
    },

    ambiental:{
      observar:"ruído e estímulos",
      ajustar:"organizar ambiente",
      evitar:"sobrecarga sensorial"
    },

    familiar:{
      observar:"padrões de comunicação",
      ajustar:"mediação simples",
      evitar:"excesso de cobrança"
    },

    biologico:{
      observar:"sinais físicos",
      ajustar:"rotina e descanso",
      evitar:"sobrecarga contínua"
    }

  };

  return base[id] || null;
},

verificarConflitos(blocos){

  if(blocos.biologico && blocos.ambiental){
    return "Ambiente pode impactar a regulação fisiológica.";
  }

  return null;
}

};

/* =====================
🧠 CORE
===================== */

const ORACULO = {

state:{ blocos:{} },

toggleBloco(id){

  if(this.state.blocos[id]){
    delete this.state.blocos[id];
  } else {
    this.state.blocos[id] = {
      observar:"",
      ajustar:"",
      evitar:""
    };
  }

  UI.updateEixos();
  UI.renderPainel(id);
},

updateCampo(id,campo,valor){
  this.state.blocos[id][campo] = valor;
},

gerarPP(){

  let txt = "PLANO PROGRAMÁTICO\n\n";

  txt += document.getElementById("contextDesc").value + "\n\n";

  Object.entries(this.state.blocos).forEach(([id,b])=>{
    txt += id.toUpperCase()+"\n";
    txt += "Observar: "+b.observar+"\n";
    txt += "Ajustar: "+b.ajustar+"\n";
    txt += "Evitar: "+b.evitar+"\n\n";
  });

  const alerta = ENGINE.verificarConflitos(this.state.blocos);
  if(alerta){
    txt += "⚠️ ALERTA: "+alerta;
  }

  return txt;
},

exportarPP(){
  document.getElementById("output").innerText = this.gerarPP();
}

};

/* =====================
🎛️ UI
===================== */

const UI = {

renderPainel(id){

  if(!ORACULO.state.blocos[id]){
    document.getElementById("painel").innerHTML =
      "<p>Selecione um eixo</p>";
    return;
  }

  const b = ORACULO.state.blocos[id];

  document.getElementById("painel").innerHTML = `
    <h5>${id}</h5>

    <button class="btn btn-sm btn-outline-secondary mb-2"
    onclick="UI.sugerirCampos('${id}')">
    Sugerir estratégia
    </button>

    <textarea oninput="ORACULO.updateCampo('${id}','observar',this.value)">${b.observar}</textarea>
    <textarea oninput="ORACULO.updateCampo('${id}','ajustar',this.value)">${b.ajustar}</textarea>
    <textarea oninput="ORACULO.updateCampo('${id}','evitar',this.value)">${b.evitar}</textarea>
  `;
},

updateEixos(){

  document.querySelectorAll(".region-item").forEach(el=>{
    el.classList.remove("active");
  });

  Object.keys(ORACULO.state.blocos).forEach(id=>{
    document.querySelector(`[onclick="ORACULO.toggleBloco('${id}')"]`)
    ?.classList.add("active");
  });
},

sugerirEixos(){

  const desc = document.getElementById("contextDesc").value.toLowerCase();

  const sugestoes = ENGINE.sugerirEixos(desc);

  sugestoes.forEach(id=>{
    if(!ORACULO.state.blocos[id]){
      ORACULO.toggleBloco(id);
    }
  });

},

sugerirCampos(id){

  const s = ENGINE.sugerirCampos(id);
  if(!s) return;

  ORACULO.state.blocos[id] = {
    ...ORACULO.state.blocos[id],
    ...s
  };

  UI.renderPainel(id);
}

};

</script>

<script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../js/components.js"></script>

</body>
</html>
