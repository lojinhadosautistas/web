<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORÁCULO | Sistema REDE</title>

<link href="../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link href="../../assets/css/hub.css" rel="stylesheet"/>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#f5f7fb;}

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:6px;
}

.region-item.active{
  background:#2563eb;
  color:#fff;
}

textarea{
  width:100%;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}

.chat-box{
  height:200px;
  overflow:auto;
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.msg{margin:6px 0;}
.bot{color:#444;}
.user{text-align:right;font-weight:bold;}

.timeline-item{
  padding:10px;
  border-left:3px solid #2563eb;
  margin-bottom:10px;
}
</style>
</head>

<body>

<main class="container mt-4">

<h2>🧠 ORÁCULO V1.3</h2>

<div class="row">

<!-- CONTEXTO -->
<div class="col-lg-3">
<div class="cardx">

<h5>Contexto</h5>

<select id="contextTipo" class="form-control mb-2">
<option>Rotina Doméstica</option>
<option>Rotina Programática</option>
<option>Atividade Física</option>
<option>Musicalização</option>
<option>Cinema</option>
<option>Circo</option>
<option>Evento Familiar</option>
<option>Evento Externo</option>
<option>Viagem</option>
</select>

<textarea id="contextDesc" placeholder="Descreva o contexto..."></textarea>

<select id="contextComplex" class="form-control">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

</div>

<!-- CHAT -->
<div class="cardx">
<h6>Assistente</h6>
<div id="chat" class="chat-box"></div>
<input id="input" class="form-control mt-2" placeholder="Digite..." onkeydown="if(event.key==='Enter')send()">
</div>

</div>

<!-- EIXOS -->
<div class="col-lg-3">
<div class="cardx">
<h5>Eixos</h5>

<div class="region-item" onclick="ORACULO.toggleBloco('terapeutico')">Terapêutico</div>
<div class="region-item" onclick="ORACULO.toggleBloco('familiar')">Familiar</div>
<div class="region-item" onclick="ORACULO.toggleBloco('ambiental')">Ambiental</div>
<div class="region-item" onclick="ORACULO.toggleBloco('biologico')">Biológico</div>

</div>

<!-- HISTÓRICO -->
<div class="cardx">
<h6>Histórico</h6>
<div id="historico"></div>
</div>

</div>

<!-- CONFIG -->
<div class="col-lg-6">
<div class="cardx" id="painel"></div>

<div class="cardx">
<button class="btn btn-primary" onclick="ORACULO.exportarPP()">Gerar PP</button>
<button class="btn btn-success" onclick="ORACULO.salvar()">Salvar</button>
<button class="btn btn-dark" onclick="ORACULO.exportarPDF()">PDF</button>

<pre id="output"></pre>
</div>

<!-- TIMELINE -->
<div class="cardx">
<h6>Timeline Evolutiva</h6>
<div id="timeline"></div>
</div>

</div>

</div>
</main>

<script>

/* ===================== STATE ===================== */
const ORACULO = {

state:{
  blocos:{},
  ordem:[],
  historico:[]
},

BLOCOS:{
  terapeutico:{titulo:"Terapêutico"},
  familiar:{titulo:"Familiar"},
  ambiental:{titulo:"Ambiental"},
  biologico:{titulo:"Biológico"}
},

toggleBloco(id){

  if(this.state.blocos[id]){
    delete this.state.blocos[id];
    this.state.ordem = this.state.ordem.filter(x=>x!==id);
  } else {
    this.state.blocos[id]={observar:"",ajustar:"",evitar:""};
    this.state.ordem.push(id);
  }

  UI.updateEixos();
  UI.renderPainel();
},

updateCampo(id,campo,val){
  this.state.blocos[id][campo]=val;
},

gerarPP(){

let txt="PLANO PROGRAMÁTICO\n\n";

this.state.ordem.forEach(id=>{
  let b=this.state.blocos[id];

  txt+=id.toUpperCase()+"\n";
  txt+="Observar: "+b.observar+"\n";
  txt+="Ajustar: "+b.ajustar+"\n";
  txt+="Evitar: "+b.evitar+"\n\n";
});

return txt;
},

exportarPP(){
  document.getElementById("output").innerText=this.gerarPP();
},

salvar(){

const item={
  data:new Date().toLocaleString(),
  pp:this.gerarPP()
};

let hist=JSON.parse(localStorage.getItem("oraculo_pps")||"[]");
hist.push(item);
localStorage.setItem("oraculo_pps",JSON.stringify(hist));

UI.renderHistorico();
UI.renderTimeline();

},

exportarPDF(){

const element=document.getElementById("output");

html2pdf().from(element).save("PP_ORACULO.pdf");

}

};

/* ===================== UI ===================== */
const UI={

renderPainel(){

let html="<h5>Configuração</h5>";

ORACULO.state.ordem.forEach(id=>{
let b=ORACULO.state.blocos[id];

html+=`
<h6>${id}</h6>
<textarea placeholder="Observar" oninput="ORACULO.updateCampo('${id}','observar',this.value)">${b.observar}</textarea>
<textarea placeholder="Ajustar" oninput="ORACULO.updateCampo('${id}','ajustar',this.value)">${b.ajustar}</textarea>
<textarea placeholder="Evitar" oninput="ORACULO.updateCampo('${id}','evitar',this.value)">${b.evitar}</textarea>
`;
});

document.getElementById("painel").innerHTML=html;
},

updateEixos(){

document.querySelectorAll(".region-item").forEach(el=>el.classList.remove("active"));

ORACULO.state.ordem.forEach(id=>{
document.querySelector(`[onclick="ORACULO.toggleBloco('${id}')"]`).classList.add("active");
});

},

renderHistorico(){

let hist=JSON.parse(localStorage.getItem("oraculo_pps")||"[]");
let html="";

hist.slice(-5).reverse().forEach(h=>{
html+=`<div class="timeline-item">${h.data}</div>`;
});

document.getElementById("historico").innerHTML=html;
},

renderTimeline(){

let hist=JSON.parse(localStorage.getItem("oraculo_pps")||"[]");
let html="";

hist.forEach(h=>{
html+=`<div class="timeline-item">${h.data}</div>`;
});

document.getElementById("timeline").innerHTML=html;
}

};

/* ===================== CHAT ===================== */

function addMsg(txt,type="bot"){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=txt;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function send(){
let input=document.getElementById("input");
let txt=input.value;
if(!txt) return;

addMsg(txt,"user");

if(txt.includes("barulho")) ORACULO.toggleBloco("ambiental");
if(txt.includes("família")) ORACULO.toggleBloco("familiar");
if(txt.includes("ansiedade")) ORACULO.toggleBloco("terapeutico");

addMsg("Eixos sugeridos ativados.");

input.value="";
}

/* INIT */
UI.renderHistorico();
UI.renderTimeline();
addMsg("Descreva o contexto.");

</script>

</body>
</html>
