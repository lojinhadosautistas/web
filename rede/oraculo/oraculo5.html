<!-- =====================
🧠 STORAGE LOCAL
===================== -->
<script>
const STORAGE = {

KEY:"ORACULO_DB",

load(){
  const d=localStorage.getItem(this.KEY);
  return d?JSON.parse(d):{pps:[]};
},

save(db){
  localStorage.setItem(this.KEY,JSON.stringify(db));
},

addPP(pp){
  const db=this.load();
  db.pps.push({...pp,id:"pp_"+Date.now(),synced:false});
  this.save(db);
}

};
</script>

<!-- =====================
🌐 NETWORK
===================== -->
<script>
const NETWORK = {

init(){
  this.update();

  window.addEventListener("online",()=>{
    this.update();
    SYNC.sync();
  });

  window.addEventListener("offline",this.update);
},

update(){
  const el=document.getElementById("netStatus");
  if(navigator.onLine){
    el.innerText="online";
    el.className="badge bg-success badge-net";
  }else{
    el.innerText="offline";
    el.className="badge bg-secondary badge-net";
  }
}

};

NETWORK.init();
</script>

<!-- =====================
🔄 SYNC
===================== -->
<script>
const SYNC = {

async sync(){

  if(!navigator.onLine) return;

  const db=STORAGE.load();

  for(const pp of db.pps){

    if(pp.synced) continue;

    try{
      await this.fake(pp);
      pp.synced=true;
    }catch(e){
      console.log("erro sync");
    }

  }

  STORAGE.save(db);
},

async fake(){
  return new Promise(r=>setTimeout(r,300));
}

};
</script>

<!-- =====================
🧠 CORE
===================== -->
<script>

const ORACULO = {

state:{ blocos:{} },

toggleBloco(id){

  if(this.state.blocos[id]){
    delete this.state.blocos[id];
  }else{
    this.state.blocos[id]={observar:"",ajustar:"",evitar:""};
  }

  UI.updateEixos();
  UI.render();
},

updateCampo(id,campo,v){
  this.state.blocos[id][campo]=v;
},

gerarPP(){

  let txt="PLANO PROGRAMÁTICO\n\n";

  Object.entries(this.state.blocos).forEach(([k,v])=>{
    txt+=k.toUpperCase()+"\n";
    txt+="Observar: "+v.observar+"\n";
    txt+="Ajustar: "+v.ajustar+"\n";
    txt+="Evitar: "+v.evitar+"\n\n";
  });

  return txt;
},

exportarPP(){

  const txt=this.gerarPP();
  document.getElementById("output").innerText=txt;

  STORAGE.addPP({
    contexto:{
      tipo:contextTipo.value,
      desc:contextDesc.value,
      complex:contextComplex.value
    },
    blocos:this.state.blocos,
    criadoEm:new Date().toISOString()
  });

  SYNC.sync();
}

};

</script>

<!-- =====================
🎛️ UI
===================== -->
<script>

const UI = {

render(){

  const painel=document.getElementById("painel");

  painel.innerHTML="";

  Object.entries(ORACULO.state.blocos).forEach(([id,b])=>{

    painel.innerHTML+=`
    <div class="cardx">
      <h6>${id.toUpperCase()}</h6>

      <textarea placeholder="Observar"
      oninput="ORACULO.updateCampo('${id}','observar',this.value)">${b.observar}</textarea>

      <textarea placeholder="Ajustar"
      oninput="ORACULO.updateCampo('${id}','ajustar',this.value)">${b.ajustar}</textarea>

      <textarea placeholder="Evitar"
      oninput="ORACULO.updateCampo('${id}','evitar',this.value)">${b.evitar}</textarea>
    </div>`;
  });

},

updateEixos(){

  document.querySelectorAll(".region-item").forEach(el=>{
    el.classList.remove("active");
  });

  Object.keys(ORACULO.state.blocos).forEach(id=>{
    const el=document.querySelector(`[onclick="ORACULO.toggleBloco('${id}')"]`);
    if(el) el.classList.add("active");
  });

}

};

</script>
