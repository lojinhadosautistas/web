<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORÁCULO | Sistema REDE</title>

<link href="../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link href="../../assets/css/hub.css" rel="stylesheet"/>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#f5f7fb;}

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:6px;
}

.region-item.active{
  background:#2563eb;
  color:#fff;
}

textarea{
  width:100%;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}

.chat-box{
  height:200px;
  overflow:auto;
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.msg{margin:6px 0;}
.bot{color:#444;}
.user{text-align:right;font-weight:bold;}

.timeline-item{
  padding:10px;
  border-left:3px solid #2563eb;
  margin-bottom:10px;
}
</style>
</head>

<body>

<main class="container mt-4">

<h2>🧠 ORÁCULO V1.3</h2>

<div class="row">

<!-- CONTEXTO -->
<div class="col-lg-3">
<div class="cardx">

<h5>Contexto</h5>

<select id="contextTipo" class="form-control mb-2">
<option>Rotina Doméstica</option>
<option>Rotina Programática</option>
<option>Atividade Física</option>
<option>Musicalização</option>
<option>Cinema</option>
<option>Circo</option>
<option>Evento Familiar</option>
<option>Evento Externo</option>
<option>Viagem</option>
</select>

<textarea id="contextDesc" placeholder="Descreva o contexto..."></textarea>

<select id="contextComplex" class="form-control">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

</div>

<!-- CHAT -->
<div class="cardx">
<h6>Assistente</h6>
<div id="chat" class="chat-box"></div>
<input id="input" class="form-control mt-2" placeholder="Digite..." onkeydown="if(event.key==='Enter')send()">
</div>

</div>

<!-- EIXOS -->
<div class="col-lg-3">
<div class="cardx">
<h5>Eixos</h5>

<div class="region-item" onclick="ORACULO.toggleBloco('terapeutico')">Terapêutico</div>
<div class="region-item" onclick="ORACULO.toggleBloco('familiar')">Familiar</div>
<div class="region-item" onclick="ORACULO.toggleBloco('ambiental')">Ambiental</div>
<div class="region-item" onclick="ORACULO.toggleBloco('biologico')">Biológico</div>

</div>

<!-- HISTÓRICO -->
<div class="cardx">
<h6>Histórico</h6>
<div id="historico"></div>
</div>

</div>

<!-- CONFIG -->
<div class="col-lg-6">
<div class="cardx" id="painel"></div>

<div class="cardx">
<button class="btn btn-primary" onclick="ORACULO.exportarPP()">Gerar PP</button>
<button class="btn btn-success" onclick="ORACULO.salvar()">Salvar</button>
<button class="btn btn-dark" onclick="ORACULO.exportarPDF()">PDF</button>

<pre id="output"></pre>
</div>

<!-- TIMELINE -->
<div class="cardx">
<h6>Timeline Evolutiva</h6>
<div id="timeline"></div>
</div>

</div>

</div>
</main>

<script>

/* =========================
🧠 STATE GLOBAL
========================= */

const ORACULO = {

state:{
  contexto:{
    tipo:"",
    desc:"",
    comp:""
  },
  eixos:{},
  blocos:{},
  ordem:[]
},

/* =========================
🧠 EXECUÇÃO CENTRAL
========================= */

executar(){

  this.capturarContexto();

  const eixos = ENGINE.analisar(this.state.contexto);

  const sugestoes = RECOMMENDER.gerar(eixos);

  this.aplicarSugestoes(eixos, sugestoes);

  MEMORY.salvar({
    contexto:this.state.contexto,
    eixos:eixos,
    plano:this.state.blocos
  });

  UI.renderPainel();
  UI.renderDashboard();
  UI.renderHistorico();

},

capturarContexto(){
  this.state.contexto.tipo = document.getElementById("contextTipo").value;
  this.state.contexto.desc = document.getElementById("contextDesc").value;
  this.state.contexto.comp = document.getElementById("contextComplex").value;
},

/* =========================
🧠 APLICAÇÃO
========================= */

aplicarSugestoes(eixos, sugestoes){

  this.state.eixos = eixos;

  Object.keys(sugestoes).forEach(e=>{

    if(!this.state.blocos[e]){
      this.state.ordem.push(e);
    }

    this.state.blocos[e] = sugestoes[e];

  });

},

/* =========================
🧠 EXPORTAÇÃO
========================= */

exportarPP(){

  let html = `
  <h2>Plano Programático</h2>
  <hr>
  <h4>Contexto</h4>
  <p>${this.state.contexto.tipo}</p>
  <p>${this.state.contexto.desc}</p>
  <hr>
  `;

  this.state.ordem.forEach(id=>{
    let b = this.state.blocos[id];

    html += `
    <h4>${id.toUpperCase()}</h4>
    <p><b>Observar:</b> ${b.observar}</p>
    <p><b>Ajustar:</b> ${b.ajustar}</p>
    <p><b>Evitar:</b> ${b.evitar}</p>
    `;
  });

  document.getElementById("output").innerHTML = html;

}

};


/* =========================
🧠 ENGINE (ANÁLISE)
========================= */

const ENGINE = {

analisar(ctx){

  let txt = ctx.desc.toLowerCase();

  let eixos = {
    terapeutico:{score:0, risco:"baixo"},
    familiar:{score:0, risco:"baixo"},
    ambiental:{score:0, risco:"baixo"},
    biologico:{score:0, risco:"baixo"}
  };

  if(txt.includes("ansiedade")) eixos.terapeutico.score += 50;
  if(txt.includes("família")) eixos.familiar.score += 50;
  if(txt.includes("barulho")) eixos.ambiental.score += 50;
  if(txt.includes("sono")) eixos.biologico.score += 50;

  const peso = {
    "Baixa":0.8,
    "Média":1,
    "Alta":1.4
  };

  Object.values(eixos).forEach(e=>{
    e.score *= peso[ctx.comp] || 1;

    if(e.score > 60) e.risco="alto";
    else if(e.score > 30) e.risco="médio";
  });

  return eixos;

}

};


/* =========================
🧠 RECOMMENDER
========================= */

const RECOMMENDER = {

gerar(eixos){

  let out = {};

  Object.entries(eixos).forEach(([e,v])=>{

    if(v.score > 30){

      out[e] = {
        observar:"Monitorar sinais relacionados ao eixo " + e,
        ajustar:"Ajustar estratégias de intervenção nesse eixo",
        evitar:"Evitar sobrecarga associada ao eixo " + e
      };

    }

  });

  return out;

}

};


/* =========================
🧠 MEMORY
========================= */

const MEMORY = {

salvar(caso){

  let db = JSON.parse(localStorage.getItem("oraculo_db")||"[]");

  db.push({
    id:Date.now(),
    data:new Date().toLocaleString(),
    ...caso
  });

  localStorage.setItem("oraculo_db", JSON.stringify(db));

},

listar(){
  return JSON.parse(localStorage.getItem("oraculo_db")||"[]");
}

};


/* =========================
📊 ANALYTICS
========================= */

const ANALYTICS = {

distribuicao(){

  let db = MEMORY.listar();

  let dist = {
    terapeutico:0,
    familiar:0,
    ambiental:0,
    biologico:0
  };

  db.forEach(c=>{
    Object.entries(c.eixos).forEach(([e,v])=>{
      if(v.score > 30) dist[e]++;
    });
  });

  return dist;

}

};


/* =========================
🎛️ UI
========================= */

const UI = {

renderPainel(){

  let html = "<h5>Blocos Programáticos</h5>";

  ORACULO.state.ordem.forEach(id=>{
    let b = ORACULO.state.blocos[id];

    html += `
    <h6>${id}</h6>
    <textarea oninput="ORACULO.state.blocos['${id}'].observar=this.value">${b.observar}</textarea>
    <textarea oninput="ORACULO.state.blocos['${id}'].ajustar=this.value">${b.ajustar}</textarea>
    <textarea oninput="ORACULO.state.blocos['${id}'].evitar=this.value">${b.evitar}</textarea>
    `;
  });

  document.getElementById("painel").innerHTML = html;

},

renderDashboard(){

  let dist = ANALYTICS.distribuicao();

  let html = "<h5>Dashboard</h5>";

  Object.entries(dist).forEach(([e,v])=>{
    html += `<div>${e}: ${v}</div>`;
  });

  document.getElementById("dashboard").innerHTML = html;

},

renderHistorico(){

  let db = MEMORY.listar().slice(-5).reverse();

  let html = "<h5>Histórico</h5>";

  db.forEach(c=>{
    html += `<div>${c.data} - ${c.contexto.tipo}</div>`;
  });

  document.getElementById("historico").innerHTML = html;

}

};

</script>

</body>
</html>
