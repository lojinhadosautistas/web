<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORÁCULO PP V13 — Sistema Clínico Preditivo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#f4f6fb;}
.sidebar{position:fixed;left:0;top:0;width:240px;height:100vh;background:#111827;color:#fff;padding:18px;}
.main{margin-left:240px;padding:20px;}
.cardx{background:#fff;border-radius:14px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-bottom:18px;}
.metric{font-size:30px;font-weight:800;}
.low{color:#0f766e;}.medium{color:#fbbf24;}.high{color:#f97316;}
.alert{border-left:4px solid #ef4444;padding:10px;background:#fff5f5;margin-top:10px;border-radius:8px;}
.month-map{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-box{background:#e5e7eb;padding:8px;border-radius:8px;text-align:center;font-size:12px;}
.day-low{background:#0f766e;color:#fff;}.day-medium{background:#fbbf24;color:#111;}.day-high{background:#f97316;color:#fff;}.day-critical{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<div class="sidebar">
<h4>🧠 ORÁCULO PP V13</h4>
<hr>
<p>Paciente único</p>
<p>IA clínica preditiva</p>
<p>Risco + evolução</p>
</div>

<div class="main">

<h2>🏥 Sistema Clínico Preditivo — Evolução do Paciente</h2>

<div class="row">
<div class="col-md-4"><div class="cardx"><h6>Risco Atual</h6><div id="riscoAtual" class="metric">--</div></div></div>
<div class="col-md-4"><div class="cardx"><h6>Previsão D+3</h6><div id="prev3" class="metric">--</div></div></div>
<div class="col-md-4"><div class="cardx"><h6>Previsão D+7</h6><div id="prev7" class="metric">--</div></div></div>
</div>

<div class="cardx">
<button class="btn btn-danger" onclick="APP.exportPDF()">📄 Gerar Laudo Clínico Preditivo</button>
<div id="alerta"></div>
</div>

<div class="cardx">
<h5>📅 Registro Clínico</h5>
<input id="data" class="form-control mb-2" placeholder="Data"/>
<input id="atividade" class="form-control mb-2" placeholder="Contexto"/>
<select id="atencao" class="form-control mb-2"><option>baixa</option><option>media</option><option>boa</option></select>
<select id="conversacao" class="form-control mb-2"><option>nao</option><option>pouca</option><option>presente</option></select>
<select id="transicoes" class="form-control mb-2"><option>dificeis</option><option>ok</option><option>tranquilas</option></select>
<button class="btn btn-primary" onclick="APP.add()">Adicionar</button>
</div>

<div class="cardx"><canvas id="grafico"></canvas></div>
<div class="cardx"><div id="monthlyMap" class="month-map"></div></div>

</div>

<script>
const STORAGE="oraculo_pp_v13";

const ENGINE={
map(v,t){const m={atencao:{baixa:1,media:2,boa:3},conversacao:{nao:1,pouca:2,presente:3},transicoes:{dificeis:1,ok:2,tranquilas:3}};return m[t][v]||0;},
risco(d){let s=0;s+=4-this.map(d.atencao,"atencao");s+=4-this.map(d.conversacao,"conversacao");s+=4-this.map(d.transicoes,"transicoes");return Math.min(1,Math.max(0,s/9));}
};

const APP={

dados:JSON.parse(localStorage.getItem(STORAGE)||"[]"),
chart:null,

save(){localStorage.setItem(STORAGE,JSON.stringify(this.dados));},

add(){this.dados.push({data:document.getElementById("data").value,atividade:document.getElementById("atividade").value,atencao:document.getElementById("atencao").value,conversacao:document.getElementById("conversacao").value,transicoes:document.getElementById("transicoes").value});this.save();this.update();this.refresh();},

risk(d){return ENGINE.risco(d);},

predict(days){if(this.dados.length<3)return 0.3;const last=this.dados.slice(-5).map(d=>ENGINE.risco(d));const trend=(last.at(-1)-last[0])||0;const base=last.reduce((a,b)=>a+b,0)/last.length;return Math.min(1,Math.max(0,base+trend*(days/3)));},

update(){this.render();this.map();this.dashboard();this.predictUI();},

render(){const ctx=document.getElementById("grafico").getContext("2d");if(this.chart)this.chart.destroy();this.chart=new Chart(ctx,{type:"line",data:{labels:this.dados.map(d=>d.data),datasets:[{label:"Risco",data:this.dados.map(d=>ENGINE.risco(d))}]}});},

dashboard(){if(!this.dados.length)return;const r=ENGINE.risco(this.dados.at(-1));document.getElementById("riscoAtual").innerText=(r*100).toFixed(0)+"%";},

predictUI(){const d3=this.predict(3);const d7=this.predict(7);
document.getElementById("prev3").innerText=(d3*100).toFixed(0)+"%";
document.getElementById("prev7").innerText=(d7*100).toFixed(0)+"%";

let msg="";
if(d7>0.7)msg="⚠️ RISCO DE DESREGULAÇÃO ALTA EM 7 DIAS";
else if(d7>0.4)msg="⚠️ ATENÇÃO: INSTABILIDADE PROGRESSIVA";
else msg="🟢 ESTABILIDADE MANTIDA";
document.getElementById("alerta").innerHTML=`<div class='alert'>${msg}</div>`;
},

map(){const el=document.getElementById("monthlyMap");el.innerHTML="";const now=new Date();const y=now.getFullYear();const m=now.getMonth();const days=new Date(y,m+1,0).getDate();for(let i=1;i<=days;i++){const iso=new Date(y,m,i).toISOString().split("T")[0];const list=this.dados.filter(d=>d.data===iso);let r=null;if(list.length)r=list.reduce((a,b)=>a+ENGINE.risco(b),0)/list.length;const d=document.createElement("div");d.className="day-box";d.innerText=i;if(r!==null)d.classList.add(r<0.3?"day-low":r<0.6?"day-medium":r<0.8?"day-high":"day-critical");el.appendChild(d);}},

refresh(){const el=document.getElementById("data");if(el._flatpickr)el._flatpickr.redraw();},

exportPDF(){const {jsPDF}=window.jspdf;const doc=new jsPDF();let y=10;const last=this.dados.at(-1);const r=last?ENGINE.risco(last):0;const p3=this.predict(3);const p7=this.predict(7);
doc.text("LAUDO CLÍNICO PREDITIVO - ORÁCULO PP",10,y);y+=10;
doc.text("Risco atual: "+(r*100).toFixed(1)+"%",10,y);y+=10;
doc.text("Previsão D+3: "+(p3*100).toFixed(1)+"%",10,y);y+=10;
doc.text("Previsão D+7: "+(p7*100).toFixed(1)+"%",10,y);y+=10;
doc.text("Registros: "+this.dados.length,10,y);y+=10;
this.dados.slice(-10).forEach(d=>{if(y>270){doc.addPage();y=10;}doc.text(`${d.data} | ${(ENGINE.risco(d)*100).toFixed(0)}%`,10,y);y+=8;});
doc.save("laudo_pp_v13.pdf");}
};

APP.update();
flatpickr("#data",{dateFormat:"Y-m-d"});
</script>

</body>
</html>
