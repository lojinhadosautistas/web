<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORÁCULO | Sistema REDE</title>

<link href="../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link href="../../assets/css/hub.css" rel="stylesheet"/>

<style>
body{ background:#f5f7fb; }

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.region-item.active{
  background:#2563eb;
  color:#fff;
}

textarea{
  width:100%;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}

.btn-main{
  background:#2563eb;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="container mt-4">

<h2>🧠 ORÁCULO</h2>

<!-- 🔘 MODO -->
<div class="mb-3">
<button class="btn btn-sm btn-outline-primary" onclick="UI.modoLivre()">Modo Livre</button>
<button class="btn btn-sm btn-outline-dark" onclick="UI.modoWizard()">Modo Guiado</button>
</div>

<!-- 🔁 CONTAINER DINÂMICO -->
<div id="app"></div>

</main>

<script>

/* =====================
🧠 ENGINE
===================== */

const ENGINE = {

sugerirEixos(contexto){
  const s=[];
  if(contexto.includes("evento")||contexto.includes("viagem")){
    s.push("ambiental","terapeutico");
  }
  if(contexto.includes("família")||contexto.includes("casa")){
    s.push("familiar");
  }
  return [...new Set(s)];
}

};

/* =====================
🧠 CORE
===================== */

const ORACULO = {

state:{
  step:1,
  modo:"livre",
  blocos:{}
},

toggleBloco(id){

  if(this.state.blocos[id]){
    delete this.state.blocos[id];
  } else {
    this.state.blocos[id]={ observar:"", ajustar:"", evitar:"" };
  }

  UI.updateEixos();
  UI.renderPainel(id);
},

next(){ this.state.step++; UI.render(); },
prev(){ this.state.step--; UI.render(); },

updateCampo(id,campo,valor){
  this.state.blocos[id][campo]=valor;
},

gerarPP(){

  let txt="PLANO PROGRAMÁTICO\n\n";

  Object.entries(this.state.blocos).forEach(([id,b])=>{
    txt+=id.toUpperCase()+"\n";
    txt+="Observar: "+b.observar+"\n";
    txt+="Ajustar: "+b.ajustar+"\n";
    txt+="Evitar: "+b.evitar+"\n\n";
  });

  return txt;
}

};

/* =====================
🎛️ UI
===================== */

const UI = {

modoLivre(){
  ORACULO.state.modo="livre";
  this.render();
},

modoWizard(){
  ORACULO.state.modo="wizard";
  ORACULO.state.step=1;
  this.render();
},

render(){

  if(ORACULO.state.modo==="livre"){
    this.renderLivre();
  }else{
    this.renderWizard();
  }

},

/* =====================
🧩 MODO LIVRE (SEU ORIGINAL)
===================== */

renderLivre(){

document.getElementById("app").innerHTML=`

<div class="row">

<div class="col-lg-3">
<div class="cardx">

<h5>Contexto</h5>
<textarea id="contextDesc"></textarea>

<button class="btn btn-sm btn-outline-primary"
onclick="UI.sugerirEixos()">✨ Sugerir Eixos</button>

</div>
</div>

<div class="col-lg-3">
<div class="cardx">

<div class="region-item" onclick="ORACULO.toggleBloco('terapeutico')">🧠 Terapêutico</div>
<div class="region-item" onclick="ORACULO.toggleBloco('familiar')">👨‍👩‍👦 Familiar</div>
<div class="region-item" onclick="ORACULO.toggleBloco('ambiental')">🏠 Ambiental</div>

</div>
</div>

<div class="col-lg-6">
<div class="cardx" id="painel"></div>
</div>

</div>

<div class="cardx mt-3">
<button class="btn btn-main" onclick="UI.showPP()">Gerar</button>
<pre id="output"></pre>
</div>

`;

},

/* =====================
🧠 WIZARD
===================== */

renderWizard(){

const s=ORACULO.state.step;

if(s===1){
document.getElementById("app").innerHTML=`
<div class="cardx">
<h5>🅾️ Contexto</h5>

<textarea id="contextDesc" placeholder="Descreva..."></textarea>

<button class="btn btn-main mt-3" onclick="ORACULO.next()">Avançar →</button>
</div>`;
}

if(s===2){
document.getElementById("app").innerHTML=`
<div class="cardx">
<h5>🆁🅰️ Eixos</h5>

<button class="btn btn-sm btn-outline-primary mb-2"
onclick="UI.sugerirEixos()">✨ Sugerir</button>

<div class="region-item" onclick="ORACULO.toggleBloco('terapeutico')">🧠 Terapêutico</div>
<div class="region-item" onclick="ORACULO.toggleBloco('familiar')">👨‍👩‍👦 Familiar</div>
<div class="region-item" onclick="ORACULO.toggleBloco('ambiental')">🏠 Ambiental</div>

<div class="mt-3 d-flex justify-content-between">
<button class="btn btn-light" onclick="ORACULO.prev()">← Voltar</button>
<button class="btn btn-main" onclick="ORACULO.next()">Avançar →</button>
</div>
</div>`;
}

if(s===3){
document.getElementById("app").innerHTML=`
<div class="cardx">
<h5>🅲 Estratégia</h5>
<div id="painel"></div>

<div class="mt-3 d-flex justify-content-between">
<button class="btn btn-light" onclick="ORACULO.prev()">← Voltar</button>
<button class="btn btn-main" onclick="ORACULO.next()">Gerar →</button>
</div>
</div>`;

const first=Object.keys(ORACULO.state.blocos)[0];
if(first){ this.renderPainel(first); }
}

if(s===4){
document.getElementById("app").innerHTML=`
<div class="cardx">
<h5>🅾️ Plano</h5>

<pre>${ORACULO.gerarPP()}</pre>

<button class="btn btn-light" onclick="ORACULO.prev()">← Ajustar</button>
</div>`;
}

},

renderPainel(id){

if(!ORACULO.state.blocos[id]) return;

const b=ORACULO.state.blocos[id];

document.getElementById("painel").innerHTML=`
<h5>${id}</h5>

<textarea oninput="ORACULO.updateCampo('${id}','observar',this.value)">${b.observar}</textarea>
<textarea oninput="ORACULO.updateCampo('${id}','ajustar',this.value)">${b.ajustar}</textarea>
<textarea oninput="ORACULO.updateCampo('${id}','evitar',this.value)">${b.evitar}</textarea>
`;

},

updateEixos(){
document.querySelectorAll(".region-item").forEach(el=>el.classList.remove("active"));
Object.keys(ORACULO.state.blocos).forEach(id=>{
document.querySelector(`[onclick="ORACULO.toggleBloco('${id}')"]`)
?.classList.add("active");
});
},

sugerirEixos(){

const desc=document.getElementById("contextDesc")?.value?.toLowerCase()||"";
const s=ENGINE.sugerirEixos(desc);

s.forEach(id=>{
if(!ORACULO.state.blocos[id]){
ORACULO.toggleBloco(id);
}
});

},

showPP(){
document.getElementById("output").innerText=ORACULO.gerarPP();
}

};

/* INIT */
UI.render();

</script>

<script src="../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../../js/components.js"></script>

</body>
</html>
