<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Atlas Cognitivo - Navegando na Tempestade | Sistema REDE</title>

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"/>

<style>

body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
}

/* CARD */
.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

/* =========================
🧠 MAPA DOS EIXOS
========================= */
.brain-wrapper{
  position:relative;
}

.brain-img{
  width:100%;
  border-radius:14px;
  transform-origin:center;
  transition:transform .3s ease;
}

.zoom-container{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

/* HOTSPOTS */
.brain-hotspot{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  background:rgba(37,99,235,.12);
  border:2px solid rgba(37,99,235,.45);
  transition:.25s;
}

.brain-hotspot:hover{
  transform:scale(1.08);
  background:rgba(37,99,235,.22);
}

/* POSIÇÕES */
#terapeutico{ top:20%; left:15%; width:70px; height:70px; }
#familiar{ top:10%; left:45%; width:70px; height:70px; }
#ambiental{ top:50%; left:40%; width:70px; height:70px; }
#biologico{ top:65%; left:70%; width:70px; height:70px; }

/* =========================
🧭 ATLAS INTERATIVO
========================= */
#atlasImage{
  width:100%;
  border-radius:14px;
  transform-origin:center;
  transition:transform .3s ease;
}

.atlas-zoom{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

/* VIDEO BUTTON */
.video-btn{
  position:absolute;
  bottom:12px;
  right:12px;
  width:52px;
  height:52px;
  background:rgba(37,99,235,.9);
  border-radius:50%;
}

.video-btn::after{
  content:"▶";
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
}

</style>

</head>

<body>

<div class="container py-4">

  <!-- =========================
  🧭 ATLAS INTERATIVO
  ========================= -->
  <div class="cardx">
    <h5><i class="bi bi-zoom-in"></i> Atlas Interativo</h5>

    <div class="zoom-container atlas-zoom">

      <img src="../assets/img/prisma-4-eixos_bg2.png"
           id="atlasImage"
           class="img-fluid">

      <a href="../assets/img/prisma-4-eixos_bg2.png"
         class="glightbox pulsating-play-btn"
         style="position:absolute;top:10px;right:10px;">
      </a>

      <a href="https://www.youtube.com/watch?v=Jbvewd7jt30"
         class="glightbox video-btn">
      </a>

    </div>

    <div class="text-center mt-2">
      <button onclick="zoomAtlasOut()">−</button>
      <button onclick="resetAtlasZoom()">⟳</button>
      <button onclick="zoomAtlasIn()">+</button>
    </div>
  </div>

  <!-- =========================
  🧠 MAPA DOS EIXOS
  ========================= -->
  <div class="cardx">
    <h5><i class="bi bi-search"></i> Mapa dos Eixos Focais</h5>

    <div class="zoom-container">

      <img src="../assets/img/prisma-4-eixos_bg.png"
           id="brainMap"
           class="brain-img">

      <div id="terapeutico" class="brain-hotspot"></div>
      <div id="familiar" class="brain-hotspot"></div>
      <div id="ambiental" class="brain-hotspot"></div>
      <div id="biologico" class="brain-hotspot"></div>

    </div>

    <div class="text-center mt-2">
      <button onclick="zoomOut()">−</button>
      <button onclick="resetZoom()">⟳</button>
      <button onclick="zoomIn()">+</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>

/* =========================
GLIGHTBOX
========================= */
const lightbox = GLightbox({
  touchNavigation: true,
  loop: false,
  zoomable: true
});

/* =========================
🧭 ZOOM ATLAS
========================= */
let atlasZoom = 1;

function applyAtlasZoom(){
  document.getElementById("atlasImage").style.transform =
    `scale(${atlasZoom})`;
}

function zoomAtlasIn(){
  atlasZoom = Math.min(atlasZoom + 0.15, 2.5);
  applyAtlasZoom();
}

function zoomAtlasOut(){
  atlasZoom = Math.max(atlasZoom - 0.15, 1);
  applyAtlasZoom();
}

function resetAtlasZoom(){
  atlasZoom = 1;
  applyAtlasZoom();
}

/* =========================
🧠 ZOOM MAPA
========================= */
let zoomLevel = 1;

function applyZoom(){
  document.getElementById("brainMap").style.transform =
    `scale(${zoomLevel})`;
}

function zoomIn(){
  zoomLevel = Math.min(zoomLevel + 0.15, 2.5);
  applyZoom();
}

function zoomOut(){
  zoomLevel = Math.max(zoomLevel - 0.15, 1);
  applyZoom();
}

function resetZoom(){
  zoomLevel = 1;
  applyZoom();
}

</script>

</body>
</html>
