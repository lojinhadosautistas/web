<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa da Nossa Mente | Sistema REDE</title>
<meta name="description" content="Mapa interativo da mente autista com experiência guiada."/>

<link href="../assets/img/favicon.png" rel="icon">
<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/hub.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
}

/* CORREÇÃO PRINCIPAL */
.main{
  margin-left:240px;
  padding:30px;
  padding-bottom:120px;
}

/* MOBILE */
@media(max-width:991px){
  .main{
    margin-left:0;
    padding:20px;
    padding-bottom:120px;
  }
}

.cardx{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
  margin-bottom:18px;
}

.page-title h1{
  font-size:2rem;
  font-weight:700;
  color:#0f172a;
}

.page-title p{
  color:#64748b;
}

/* GRID FIXO */
.layout-grid{
  display:grid;
  grid-template-columns:280px 1fr 320px;
  gap:20px;
  align-items:start;
}

@media(max-width:1200px){
  .layout-grid{
    grid-template-columns:1fr;
  }
}

/* LISTA */
.region-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.region-item:hover{
  background:#eef2ff;
}

.region-active{
  background:#dbeafe;
}

/* BRAIN */
.brain-wrapper{
  position:relative;
  max-width:700px;
  margin:auto;
}

.brain-img{
  width:100%;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* HOTSPOTS */
.brain-hotspot{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  transition:.25s;
}

.brain-hotspot:hover{
  background:rgba(37,99,235,.12);
}

.brain-hotspot.active{
  background:rgba(37,99,235,.22);
  transform:scale(1.18);
}

/* posições */
#prefrontal{top:18%;left:14%;width:75px;height:75px;}
#parietal{top:10%;left:43%;width:75px;height:75px;}
#temporal{top:48%;left:40%;width:75px;height:75px;}
#occipital{top:28%;left:76%;width:65px;height:65px;}
#cerebelo{top:72%;left:72%;width:60px;height:60px;}
#limbico{top:44%;left:29%;width:60px;height:60px;}
#insula{top:41%;left:48%;width:42px;height:42px;}

/* guia */
.guia-box{
  background:#eef2ff;
  border-radius:12px;
  padding:16px;
  min-height:100px;
}

.progress-dots{
  text-align:center;
  margin-top:10px;
  letter-spacing:4px;
}

.dot{
  opacity:.3;
}

.dot.active{
  opacity:1;
  color:#2563eb;
}

/* mini cards */
.mini-card{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:16px;
  background:white;
  margin-bottom:14px;
}

/* player */
.audio-player{
  position:fixed;
  bottom:0;
  left:240px;
  right:0;
  background:#0f172a;
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:16px;
  z-index:999;
}

.audio-player audio{
  width:100%;
  height:36px;
}

@media(max-width:991px){
  .audio-player{
    left:0;
  }
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div class="page-title mb-4">
  <h1>🧠 Mapa da Nossa Mente</h1>
  <p>Uma forma sensível de entender o cérebro autista</p>
</div>

<div class="layout-grid">

  <!-- ESQUERDA -->
  <div>
    <div class="cardx">
      <h4>💙 Trilha para mães</h4>

      <div id="guia" class="guia-box">
        Clique em iniciar
      </div>

      <div id="dots" class="progress-dots"></div>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-outline-secondary" onclick="prevGuia()">
          <i class="bi bi-arrow-left"></i>
        </button>

        <button class="btn btn-primary flex-fill" onclick="startGuia()">
          Iniciar
        </button>

        <button class="btn btn-outline-secondary" onclick="nextGuia()">
          <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>

    <div class="cardx">
      <h5>Regiões</h5>

      <div class="region-item" data-id="prefrontal">🔴 Pré-frontal</div>
      <div class="region-item" data-id="parietal">🟠 Parietal</div>
      <div class="region-item" data-id="temporal">🔵 Temporal</div>
      <div class="region-item" data-id="occipital">🟢 Occipital</div>
      <div class="region-item" data-id="cerebelo">🟣 Cerebelo</div>
      <div class="region-item" data-id="limbico">🟡 Límbico</div>
      <div class="region-item" data-id="insula">🔷 Ínsula</div>
    </div>
  </div>

  <!-- CENTRO -->
  <div>
    <div class="cardx">
      <div class="brain-wrapper">

        <img src="../assets/img/brain-map.png" class="brain-img"/>

        <div id="prefrontal" class="brain-hotspot"></div>
        <div id="parietal" class="brain-hotspot"></div>
        <div id="temporal" class="brain-hotspot"></div>
        <div id="occipital" class="brain-hotspot"></div>
        <div id="cerebelo" class="brain-hotspot"></div>
        <div id="limbico" class="brain-hotspot"></div>
        <div id="insula" class="brain-hotspot"></div>

      </div>
    </div>
  </div>

  <!-- DIREITA -->
  <div>
    <div class="cardx" id="painel">
      <h4>Região selecionada</h4>
      <p>Clique em uma região.</p>
    </div>
  </div>

</div>

</main>

<!-- PLAYER -->
<div class="audio-player">
  <i class="bi bi-music-note-beamed text-white"></i>
  <audio controls>
    <source src="audio/prefrontal.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
const regioes={
prefrontal:{titulo:"Córtex Pré-frontal",desc:"Planejamento e decisão"},
parietal:{titulo:"Córtex Parietal",desc:"Sensorial e integração"},
temporal:{titulo:"Córtex Temporal",desc:"Linguagem e memória"},
occipital:{titulo:"Córtex Occipital",desc:"Visão"},
cerebelo:{titulo:"Cerebelo",desc:"Coordenação"},
limbico:{titulo:"Sistema Límbico",desc:"Emoções"},
insula:{titulo:"Ínsula",desc:"Consciência corporal"}
};

const trilha=[
"Respira. Vamos entender juntos.",
"O cérebro autista sente intensamente.",
"O mundo pode ser sensorialmente exigente.",
"A comunicação pode acontecer de forma própria.",
"Mudanças exigem energia.",
"Há muitas forças e talentos aqui."
];

let passo=0;

function renderDots(){
  let html="";
  trilha.forEach((_,i)=>{
    html+=`<span class="dot ${i===passo?'active':''}">●</span>`;
  });
  document.getElementById("dots").innerHTML=html;
}

function renderGuia(){
  document.getElementById("guia").innerHTML=trilha[passo];
  renderDots();
}

function startGuia(){
  passo=0;
  renderGuia();
}

function nextGuia(){
  if(passo<trilha.length-1){
    passo++;
    renderGuia();
  }
}

function prevGuia(){
  if(passo>0){
    passo--;
    renderGuia();
  }
}

function selectRegion(id){
  let r=regioes[id];

  document.getElementById("painel").innerHTML=`
    <h4>${r.titulo}</h4>
    <p>${r.desc}</p>
  `;

  document.querySelectorAll('.brain-hotspot').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.region-item').forEach(el=>el.classList.remove('region-active'));

  document.getElementById(id)?.classList.add('active');
  document.querySelector(`[data-id="${id}"]`)?.classList.add('region-active');
}

document.querySelectorAll('.region-item').forEach(el=>{
  el.addEventListener('click',()=>selectRegion(el.dataset.id));
});

document.querySelectorAll('.brain-hotspot').forEach(el=>{
  el.addEventListener('click',()=>selectRegion(el.id));
});

renderDots();
</script>

<script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/components.js"></script>

</body>
</html>
