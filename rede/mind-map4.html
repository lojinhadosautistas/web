<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mapa da Nossa Mente | Sistema REDE</title>

<meta name="description" content="Mapa interativo da mente autista com experiência guiada para famílias."/>

<link href="../assets/img/favicon.png" rel="icon">

<!-- HUB CSS -->
<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/hub.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>

body{
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
}

/* CARD */
.cardx{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

/* LISTA */
.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.region-item:hover{ background:#eef2ff; }
.region-active{ background:#dbeafe; }

/* BRAIN */
.brain-wrapper{
  position:relative;
  max-width:520px;
  margin:auto;
}

.brain-img{
  width:100%;
  border-radius:12px;
}

/* ÁREAS CLICÁVEIS */
.brain-hotspot{
  position:absolute;
  cursor:pointer;
  border-radius:50%;
  transition:.2s;
}

.brain-hotspot:hover{
  background:rgba(37,99,235,0.15);
  transform:scale(1.1);
}

/* POSIÇÕES (ajustáveis conforme imagem) */
#prefrontal{ top:20%; left:15%; width:70px; height:70px; }
#parietal{ top:10%; left:45%; width:70px; height:70px; }
#temporal{ top:50%; left:40%; width:70px; height:70px; }
#occipital{ top:25%; left:75%; width:60px; height:60px; }
#cerebelo{ top:70%; left:70%; width:60px; height:60px; }
#limbico{ top:45%; left:30%; width:60px; height:60px; }
#insula{ top:40%; left:48%; width:40px; height:40px; }

/* GUIA */
.guia-box{
  background:#eef2ff;
  padding:14px;
  border-radius:12px;
  min-height:90px;
  margin-bottom:15px;
}

</style>

</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div class="page-title mb-4">
<h1>🧠 Mapa da Nossa Mente</h1>
<p>Uma forma sensível de entender como o cérebro autista funciona</p>
</div>

<div class="row g-4">

<!-- ESQUERDA -->
<div class="col-lg-3">

<div class="cardx">

<h5>Regiões</h5>

<div class="region-item" onclick="selectRegion('prefrontal')">🔴 Pré-frontal</div>
<div class="region-item" onclick="selectRegion('parietal')">🟠 Parietal</div>
<div class="region-item" onclick="selectRegion('temporal')">🔵 Temporal</div>
<div class="region-item" onclick="selectRegion('occipital')">🟢 Occipital</div>
<div class="region-item" onclick="selectRegion('cerebelo')">🟣 Cerebelo</div>
<div class="region-item" onclick="selectRegion('limbico')">🟡 Límbico</div>
<div class="region-item" onclick="selectRegion('insula')">🔷 Ínsula</div>

</div>

<div class="cardx mt-3">

<h5>💙 Trilha para mães</h5>

<div class="guia-box" id="guia">
Clique em "Iniciar jornada"
</div>

<button class="btn btn-primary w-100" onclick="startGuia()">
Iniciar jornada
</button>

</div>

</div>

<!-- CENTRO -->
<div class="col-lg-6">

<div class="cardx">

<div class="brain-wrapper">

<img src="../assets/img/brain-map.png" class="brain-img">

<!-- HOTSPOTS -->
<div id="prefrontal" class="brain-hotspot" onclick="selectRegion('prefrontal')"></div>
<div id="parietal" class="brain-hotspot" onclick="selectRegion('parietal')"></div>
<div id="temporal" class="brain-hotspot" onclick="selectRegion('temporal')"></div>
<div id="occipital" class="brain-hotspot" onclick="selectRegion('occipital')"></div>
<div id="cerebelo" class="brain-hotspot" onclick="selectRegion('cerebelo')"></div>
<div id="limbico" class="brain-hotspot" onclick="selectRegion('limbico')"></div>
<div id="insula" class="brain-hotspot" onclick="selectRegion('insula')"></div>

</div>

</div>

</div>

<!-- DIREITA -->
<div class="col-lg-3">

<div class="cardx" id="painel">
<h5>Região selecionada</h5>
<p>Clique em uma área do cérebro</p>
</div>

</div>

</div>

</main>

<script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/components.js"></script>

<script>

// BASE
const regioes = {

prefrontal:{
titulo:"Córtex Pré-frontal",
desc:"Planejamento e controle",
autismo:"Mudanças podem ser difíceis"
},

parietal:{
titulo:"Córtex Parietal",
desc:"Sensações do corpo",
autismo:"Pode haver sobrecarga sensorial"
},

temporal:{
titulo:"Córtex Temporal",
desc:"Audição e linguagem",
autismo:"Processamento diferente de sons"
},

occipital:{
titulo:"Córtex Occipital",
desc:"Visão",
autismo:"Pensamento visual forte"
},

cerebelo:{
titulo:"Cerebelo",
desc:"Coordenação",
autismo:"Movimentos podem variar"
},

limbico:{
titulo:"Sistema Límbico",
desc:"Emoções",
autismo:"Sentimentos intensos"
},

insula:{
titulo:"Ínsula",
desc:"Percepção interna",
autismo:"Consciência corporal diferente"
}

};

// SELEÇÃO
function selectRegion(id){

let r = regioes[id];

document.getElementById("painel").innerHTML = `
<h5>${r.titulo}</h5>
<p><b>${r.desc}</b></p>
<hr>
<p>${r.autismo}</p>
`;

document.querySelectorAll('.region-item').forEach(el=>{
el.classList.remove('region-active');
});

}

// GUIA EMOCIONAL
const trilha = [
"Respira. Vamos entender juntos.",
"O cérebro autista sente mais.",
"Não é excesso. É intensidade.",
"Seu filho não está contra você.",
"Ele está tentando lidar.",
"E você já está fazendo muito."
];

let passo=0;

function startGuia(){
passo=0;
nextGuia();
}

function nextGuia(){
if(passo<trilha.length){
document.getElementById("guia").innerText=trilha[passo];
passo++;
setTimeout(nextGuia,4000);
}
}

</script>

</body>
</html>
