<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Atlas Cognitivo - Mapa da Mente | Sistema REDE</title>
<meta name="description" content="Mapa interativo da mente autista com experiência guiada, trilha visual e narração."/>

<link href="../assets/img/favicon.png" rel="icon">

<link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/hub.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
}

.cardx{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-bottom:18px;
}

.region-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.region-item:hover{ background:#eef2ff; }

.region-active{
  background:#dbeafe;
  font-weight:600;
}

.brain-wrapper{
  position:relative;
  max-width:560px;
  margin:auto;
}

.brain-img{
  width:100%;
  border-radius:14px;
}

.brain-hotspot{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  transition:.25s;
  background:rgba(37,99,235,.12);
  border:2px solid rgba(37,99,235,.45);
}

.brain-hotspot:hover{
  background:rgba(37,99,235,.22);
  border-color:rgba(37,99,235,.7);
  transform:scale(1.08);
}

.brain-hotspot.active{
  background:rgba(37,99,235,.35);
  border-color:#2563eb;
  transform:scale(1.18);
}

.brain-hotspot.audio-glow{
  animation: audioPulse 1.2s infinite;
}

@keyframes audioPulse{
  0%{ transform:scale(1); box-shadow:0 0 0 rgba(37,99,235,.2); }
  50%{ transform:scale(1.2); box-shadow:0 0 22px rgba(37,99,235,.6); }
  100%{ transform:scale(1); box-shadow:0 0 0 rgba(37,99,235,.2); }
}

/* POSIÇÕES */
#prefrontal{ top:18%; left:15%; width:72px; height:72px; }
#parietal{ top:10%; left:45%; width:72px; height:72px; }
#temporal{ top:50%; left:42%; width:72px; height:72px; }
#occipital{ top:25%; left:76%; width:58px; height:58px; }
#cerebelo{ top:72%; left:70%; width:58px; height:58px; }
#limbico{ top:45%; left:30%; width:60px; height:60px; }
#insula{ top:40%; left:49%; width:42px; height:42px; }

.guia-box{
  background:#eef2ff;
  padding:14px;
  border-radius:12px;
  min-height:100px;
}

.progress-dots{
  text-align:center;
  margin-top:10px;
  letter-spacing:5px;
}

.dot{ opacity:.3; }
.dot.active{ opacity:1; color:#2563eb; }

.story-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  background:#f8fafc;
  margin-top:14px;
}

.audio-player{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0f172a;
  color:white;
  display:flex;
  align-items:center;
  gap:16px;
  padding:12px 20px;
  z-index:999;
}

main{ padding-bottom:110px; }

/* MOBILE APP MODE */
@media (max-width:768px){
  .col-lg-3,.col-lg-6{ width:100%; }

  .brain-hotspot{
    width:80px !important;
    height:80px !important;
  }
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main">

<div class="page-title mb-4">
  <h1>Atlas Cognitivo 🧠 Mapa da Mente</h1>
  <p>Uma forma visual e sensível de compreender o cérebro autista</p>
</div>

<div class="row g-4">

<!-- ESQUERDA -->
<div class="col-lg-3">

<div class="cardx">
<h5>Regiões</h5>

<div class="region-item" data-id="prefrontal">Córtex Pré-frontal</div>
<div class="region-item" data-id="parietal">Córtex Parietal</div>
<div class="region-item" data-id="temporal">Córtex Temporal</div>
<div class="region-item" data-id="occipital">Córtex Occipital</div>
<div class="region-item" data-id="cerebelo">Cerebelo</div>
<div class="region-item" data-id="limbico">Sistema Límbico</div>
<div class="region-item" data-id="insula">Ínsula</div>

</div>

</div>

<!-- CENTRO -->
<div class="col-lg-6">

<div class="cardx">
<div class="brain-wrapper">

<img src="../assets/img/brain-map.png" class="brain-img">

<div id="prefrontal" class="brain-hotspot"></div>
<div id="parietal" class="brain-hotspot"></div>
<div id="temporal" class="brain-hotspot"></div>
<div id="occipital" class="brain-hotspot"></div>
<div id="cerebelo" class="brain-hotspot"></div>
<div id="limbico" class="brain-hotspot"></div>
<div id="insula" class="brain-hotspot"></div>

</div>
</div>

<div class="cardx" id="painel">
<h5>Região selecionada</h5>
<p>Clique em uma área do cérebro</p>
</div>

</div>

<!-- DIREITA -->
<div class="col-lg-3">

<div class="cardx">
<h5>Audioteca</h5>
<div id="fabulariumLibrary"></div>
</div>

</div>

</div>
</main>

<script>
/* =========================
🧠 STATE + TRACKING V3.6
========================= */
const STATE = {
  currentRegion: null,
  currentAudio: null,
  attention: {},
  tracker: null,
  lastTick: null
};

/* init attention map */
["prefrontal","parietal","temporal","occipital","cerebelo","limbico","insula"]
.forEach(r=>{
  STATE.attention[r] = { time:0, visits:0 };
});

/* =========================
REGIÕES (simplificado)
========================= */
const regioes = {
prefrontal:{titulo:"Pré-frontal", audioFile:"audio1.mp3"},
parietal:{titulo:"Parietal", audioFile:"audio2.mp3"},
temporal:{titulo:"Temporal", audioFile:"audio3.mp3"},
occipital:{titulo:"Occipital", audioFile:"audio4.mp3"},
cerebelo:{titulo:"Cerebelo", audioFile:"audio5.mp3"},
limbico:{titulo:"Límbico", audioFile:"audio6.mp3"},
insula:{titulo:"Ínsula", audioFile:"audio7.mp3"}
};

/* =========================
TRACKING DE ATENÇÃO
========================= */
function startTracking(){
  stopTracking();
  STATE.lastTick = Date.now();

  STATE.tracker = setInterval(()=>{
    if(!STATE.currentRegion) return;

    const now = Date.now();
    const diff = (now - STATE.lastTick)/1000;
    STATE.lastTick = now;

    STATE.attention[STATE.currentRegion].time += diff;

  },1000);
}

function stopTracking(){
  if(STATE.tracker){
    clearInterval(STATE.tracker);
    STATE.tracker = null;
  }
}

/* =========================
SYNC CENTRAL
========================= */
function syncRegion(id){

  if(!id) return;

  STATE.currentRegion = id;
  STATE.attention[id].visits++;

  document.querySelectorAll('.brain-hotspot')
    .forEach(e=>e.classList.remove('active','audio-glow'));

  document.querySelectorAll('.region-item')
    .forEach(e=>e.classList.remove('region-active'));

  document.getElementById(id)?.classList.add('active','audio-glow');
  document.querySelector(`[data-id="${id}"]`)?.classList.add('region-active');

  updatePanel(id);
  scrollPlaylist(id);

  startTracking();
}

/* =========================
AUDIO SYNC
========================= */
function playRegionAudio(src,title,id){

  syncRegion(id);

  let audio = document.getElementById("audioControl");

  if(!audio){
    audio = document.createElement("audio");
    audio.id = "audioControl";
    document.body.appendChild(audio);
  }

  audio.src = src;
  audio.play();
}

/* =========================
SCROLL
========================= */
function scrollPlaylist(id){
  const el = document.querySelector(".cat-"+id);
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }
}

/* =========================
UI PANEL
========================= */
function updatePanel(id){
  const r = regioes[id];
  document.getElementById("painel").innerHTML =
  `<h5>${r.titulo}</h5>`;
}

/* =========================
PLAYLIST
========================= */
function renderPlaylist(){
  const c = document.getElementById("fabulariumLibrary");
  c.innerHTML="";

  Object.entries(regioes).forEach(([k,r])=>{
    const div=document.createElement("div");
    div.className="story-item cat-"+k;
    div.innerHTML=r.titulo;

    div.onclick=()=>playRegionAudio(r.audioFile,r.titulo,k);
    c.appendChild(div);
  });
}

/* EVENTS */
document.querySelectorAll('.brain-hotspot')
.forEach(e=>{
  e.onclick=()=>syncRegion(e.id);
});

document.querySelectorAll('.region-item')
.forEach(e=>{
  e.onclick=()=>syncRegion(e.dataset.id);
});

renderPlaylist();

/* =========================
DEBUG / INSIGHTS
========================= */
function getAttentionReport(){
  console.table(STATE.attention);
  return STATE.attention;
}
</script>

</body>
</html>
