<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tetris</title>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#0f172a;
    color:#f8fafc;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* =========================================
   LAYOUT
========================================= */

.container{
    width:100%;
    max-width:1200px;

    display:grid;
    grid-template-columns:1fr 340px;
    gap:30px;
}

.game-panel{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:30px;
    padding:25px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.side-panel{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* =========================================
   BOARD
========================================= */

canvas{
    background:#020617;
    border-radius:20px;
    border:3px solid #334155;

    max-width:100%;
}

/* =========================================
   CARDS
========================================= */

.card{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:24px;
    padding:24px;
}

.card-title{
    font-size:18px;
    color:#94a3b8;
    margin-bottom:10px;
}

.card-value{
    font-size:42px;
    font-weight:900;
}

/* =========================================
   TITLE
========================================= */

.logo{
    text-align:center;
    margin-bottom:10px;
}

.logo h1{
    font-size:64px;
    line-height:1;
    margin-bottom:10px;
}

.logo span:nth-child(1){
    color:#38bdf8;
}

.logo span:nth-child(2){
    color:#facc15;
}

.logo span:nth-child(3){
    color:#22c55e;
}

.logo span:nth-child(4){
    color:#f97316;
}

.logo span:nth-child(5){
    color:#e879f9;
}

.subtitle{
    color:#cbd5e1;
    text-align:center;
    line-height:1.7;
    margin-bottom:20px;
}

/* =========================================
   BUTTONS
========================================= */

.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    border:none;
    padding:18px;
    border-radius:18px;

    font-size:18px;
    font-weight:900;

    cursor:pointer;

    transition:.15s;
}

button:hover{
    transform:translateY(-2px);
}

.start{
    background:#22c55e;
    color:white;
}

.pause{
    background:#f59e0b;
    color:white;
}

.reset{
    background:#ef4444;
    color:white;
}

/* =========================================
   CONTROLS
========================================= */

.controls{
    line-height:2;
    color:#cbd5e1;
}

.controls strong{
    color:white;
}

/* =========================================
   GAME OVER
========================================= */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(2,6,23,.85);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;
}

.overlay-content{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:30px;

    padding:40px;

    text-align:center;

    width:90%;
    max-width:500px;
}

.overlay h2{
    font-size:52px;
    margin-bottom:15px;
}

.overlay p{
    font-size:22px;
    color:#cbd5e1;
    margin-bottom:25px;
}

/* =========================================
   RESPONSIVO
========================================= */

@media(max-width:980px){

    .container{
        grid-template-columns:1fr;
    }

}

@media(max-width:768px){

    .logo h1{
        font-size:42px;
    }

    .card-value{
        font-size:32px;
    }

}

</style>

</head>

<body>

<div class="container">

    <!-- GAME -->

    <div class="game-panel">

        <canvas
            id="tetris"
            width="300"
            height="600">
        </canvas>

    </div>

    <!-- SIDE -->

    <div class="side-panel">

        <div class="logo">

            <h1>
                <span>T</span>
                <span>E</span>
                <span>T</span>
                <span>R</span>
                <span>I</span>
                <span>S</span>
            </h1>

            <div class="subtitle">

                Organize peças,
                desenvolva foco,
                percepção espacial
                e velocidade cognitiva.

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                Pontuação
            </div>

            <div
                class="card-value"
                id="score">
                0
            </div>

        </div>

        <div class="card">

            <div class="card-title">
                Linhas
            </div>

            <div
                class="card-value"
                id="lines">
                0
            </div>

        </div>

        <div class="card">

            <div class="card-title">
                Nível
            </div>

            <div
                class="card-value"
                id="level">
                1
            </div>

        </div>

        <div class="buttons">

            <button
                class="start"
                onclick="startGame()">

                ▶ Iniciar

            </button>

            <button
                class="pause"
                onclick="togglePause()">

                ⏸ Pausar

            </button>

            <button
                class="reset"
                onclick="resetGame()">

                ↺ Reiniciar

            </button>

        </div>

        <div class="card">

            <div class="card-title">
                Controles
            </div>

            <div class="controls">

                <strong>← →</strong>
                mover peça

                <br>

                <strong>↑</strong>
                girar

                <br>

                <strong>↓</strong>
                acelerar

                <br>

                <strong>Espaço</strong>
                queda rápida

            </div>

        </div>

    </div>

</div>

<!-- GAME OVER -->

<div class="overlay" id="gameOver">

    <div class="overlay-content">

        <h2>
            Game Over
        </h2>

        <p>
            Sua pontuação:
            <strong id="finalScore">
                0
            </strong>
        </p>

        <button
            class="start"
            onclick="resetGame()">

            Jogar Novamente

        </button>

    </div>

</div>

<script>

/* =========================================
   CONFIG
========================================= */

const canvas =
document.getElementById("tetris");

const ctx =
canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const BLOCK = 30;

ctx.scale(BLOCK,BLOCK);

let board =
createBoard();

let score = 0;
let lines = 0;
let level = 1;

let paused = false;
let gameRunning = false;

const colors = [
    null,
    "#38bdf8",
    "#facc15",
    "#22c55e",
    "#ef4444",
    "#a855f7",
    "#f97316",
    "#e879f9"
];

const pieces = [

[],
[[1,1,1],[0,1,0]],
[[2,2],[2,2]],
[[0,3,3],[3,3,0]],
[[4,4,0],[0,4,4]],
[[5,5,5,5]],
[[6,0,0],[6,6,6]],
[[0,0,7],[7,7,7]]

];

function createBoard(){

    return Array.from(
        {length:ROWS},
        ()=>Array(COLS).fill(0)
    );

}

function randomPiece(){

    const type =
    pieces[
        Math.floor(
            Math.random() *
            (pieces.length-1)
        ) + 1
    ];

    return {

        pos:{
            x:3,
            y:0
        },

        matrix:type

    };

}

let player =
randomPiece();

/* =========================================
   DRAW
========================================= */

function draw(){

    ctx.fillStyle =
    "#020617";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawMatrix(board,{x:0,y:0});

    drawMatrix(
        player.matrix,
        player.pos
    );

}

function drawMatrix(matrix,offset){

    matrix.forEach((row,y)=>{

        row.forEach((value,x)=>{

            if(value !== 0){

                ctx.fillStyle =
                colors[value];

                ctx.fillRect(
                    x + offset.x,
                    y + offset.y,
                    1,
                    1
                );

                ctx.strokeStyle =
                "#020617";

                ctx.lineWidth =
                0.05;

                ctx.strokeRect(
                    x + offset.x,
                    y + offset.y,
                    1,
                    1
                );

            }

        });

    });

}

/* =========================================
   COLLISION
========================================= */

function collide(board,player){

    const [m,o] = [
        player.matrix,
        player.pos
    ];

    for(let y=0;y<m.length;y++){

        for(let x=0;x<m[y].length;x++){

            if(
                m[y][x] !== 0 &&
                (
                    board[y+o.y] &&
                    board[y+o.y][x+o.x]
                ) !== 0
            ){

                return true;

            }

        }

    }

    return false;

}

/* =========================================
   MERGE
========================================= */

function merge(board,player){

    player.matrix.forEach((row,y)=>{

        row.forEach((value,x)=>{

            if(value !== 0){

                board[y+player.pos.y][x+player.pos.x] =
                value;

            }

        });

    });

}

/* =========================================
   ROTATE
========================================= */

function rotate(matrix){

    return matrix[0]
        .map((_,i)=>
            matrix.map(
                row=>row[i]
            ).reverse()
        );

}

/* =========================================
   PLAYER
========================================= */

function playerDrop(){

    player.pos.y++;

    if(collide(board,player)){

        player.pos.y--;

        merge(board,player);

        clearLines();

        player =
        randomPiece();

        if(collide(board,player)){

            gameOver();

        }

    }

    dropCounter = 0;

}

function playerMove(dir){

    player.pos.x += dir;

    if(collide(board,player)){

        player.pos.x -= dir;

    }

}

function playerRotate(){

    const pos =
    player.pos.x;

    let offset = 1;

    player.matrix =
    rotate(player.matrix);

    while(collide(board,player)){

        player.pos.x += offset;

        offset =
        -(offset + (
            offset > 0 ? 1 : -1
        ));

        if(offset >
            player.matrix[0].length
        ){

            player.matrix =
            rotate(
                rotate(
                    rotate(
                        player.matrix
                    )
                )
            );

            player.pos.x = pos;

            return;

        }

    }

}

/* =========================================
   CLEAR LINES
========================================= */

function clearLines(){

    outer:
    for(let y=board.length-1;y>0;y--){

        for(let x=0;x<COLS;x++){

            if(board[y][x] === 0){

                continue outer;

            }

        }

        const row =
        board.splice(y,1)[0]
            .fill(0);

        board.unshift(row);

        y++;

        score += 100;
        lines++;

        level =
        Math.floor(lines / 10) + 1;

    }

    updateStats();

}

/* =========================================
   STATS
========================================= */

function updateStats(){

    document.getElementById(
        "score"
    ).innerText = score;

    document.getElementById(
        "lines"
    ).innerText = lines;

    document.getElementById(
        "level"
    ).innerText = level;

}

/* =========================================
   LOOP
========================================= */

let dropCounter = 0;
let lastTime = 0;

function update(time=0){

    if(!gameRunning) return;

    if(paused){

        requestAnimationFrame(update);

        return;

    }

    const delta =
    time - lastTime;

    lastTime = time;

    dropCounter += delta;

    const speed =
    Math.max(
        100,
        1000 - (level * 70)
    );

    if(dropCounter > speed){

        playerDrop();

    }

    draw();

    requestAnimationFrame(update);

}

/* =========================================
   GAME
========================================= */

function startGame(){

    if(gameRunning) return;

    gameRunning = true;

    document.getElementById(
        "gameOver"
    ).style.display = "none";

    update();

}

function togglePause(){

    paused = !paused;

}

function resetGame(){

    board = createBoard();

    player = randomPiece();

    score = 0;
    lines = 0;
    level = 1;

    paused = false;
    gameRunning = true;

    updateStats();

    document.getElementById(
        "gameOver"
    ).style.display = "none";

    update();

}

function gameOver(){

    gameRunning = false;

    document.getElementById(
        "finalScore"
    ).innerText = score;

    document.getElementById(
        "gameOver"
    ).style.display = "flex";

}

/* =========================================
   CONTROLS
========================================= */

document.addEventListener(
    "keydown",
    event=>{

        if(!gameRunning) return;

        if(event.key === "ArrowLeft"){

            playerMove(-1);

        }

        else if(
            event.key === "ArrowRight"
        ){

            playerMove(1);

        }

        else if(
            event.key === "ArrowDown"
        ){

            playerDrop();

        }

        else if(
            event.key === "ArrowUp"
        ){

            playerRotate();

        }

        else if(
            event.code === "Space"
        ){

            while(
                !collide(board,player)
            ){

                player.pos.y++;

            }

            player.pos.y--;

            playerDrop();

        }

    }
);

/* =========================================
   INIT
========================================= */

draw();

</script>

</body>
</html>
