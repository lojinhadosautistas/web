<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mahjong Relax</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top,#1e293b,#020617);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.mahjong-container{
    width:100%;
    max-width:1100px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:30px;
    backdrop-filter:blur(12px);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.35);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
    margin-bottom:10px;
}

.header p{
    opacity:0.7;
    font-size:16px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.stat-box{
    background:rgba(255,255,255,0.06);
    padding:12px 20px;
    border-radius:14px;
    min-width:140px;
    text-align:center;
}

.stat-box span{
    display:block;
    font-size:13px;
    opacity:0.6;
    margin-bottom:4px;
}

.stat-box strong{
    font-size:22px;
}

#mahjong-board{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:12px;
}

.tile{
    aspect-ratio:1/1.2;
    background:linear-gradient(145deg,#f8fafc,#e2e8f0);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
    position:relative;
    box-shadow:
        0 4px 10px rgba(0,0,0,0.2);
}

.tile:hover{
    transform:translateY(-4px) scale(1.03);
}

.tile.selected{
    background:linear-gradient(145deg,#fde68a,#f59e0b);
    transform:scale(1.05);
}

.tile.matched{
    opacity:0;
    transform:scale(0);
    pointer-events:none;
}

.footer{
    margin-top:30px;
    text-align:center;
}

button{
    border:none;
    background:#22c55e;
    color:white;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    background:#16a34a;
}

.win-message{
    margin-top:20px;
    font-size:22px;
    color:#fde68a;
    display:none;
}

@media(max-width:768px){

    .header h1{
        font-size:30px;
    }

    #mahjong-board{
        grid-template-columns:repeat(4,1fr);
    }

    .tile{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="mahjong-container">

    <div class="header">
        <h1>🀄 Mahjong Relax</h1>
        <p>Encontre os pares e limpe o tabuleiro</p>
    </div>

    <div class="stats">

        <div class="stat-box">
            <span>Movimentos</span>
            <strong id="moves">0</strong>
        </div>

        <div class="stat-box">
            <span>Pares Restantes</span>
            <strong id="remaining">16</strong>
        </div>

    </div>

    <div id="mahjong-board"></div>

    <div class="footer">
        <button onclick="startGame()">
            Novo Jogo
        </button>

        <div class="win-message" id="winMessage">
            🌸 Parabéns! Você completou o Mahjong!
        </div>
    </div>

</div>

<script>

const board = document.getElementById("mahjong-board");
const movesDisplay = document.getElementById("moves");
const remainingDisplay = document.getElementById("remaining");
const winMessage = document.getElementById("winMessage");

const emojis = [
    "🌸","🌻","🍀","🌙",
    "🔥","💎","🪷","🐉",
    "☯️","⭐","🍄","🌿",
    "🦋","🌊","🍁","☀️"
];

let selected = [];
let moves = 0;
let matchedPairs = 0;

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] =
        [array[j], array[i]];
    }

    return array;
}

function startGame(){

    board.innerHTML = "";

    selected = [];
    moves = 0;
    matchedPairs = 0;

    movesDisplay.innerText = moves;
    remainingDisplay.innerText = emojis.length;

    winMessage.style.display = "none";

    const tiles = shuffle([...emojis, ...emojis]);

    tiles.forEach((emoji)=>{

        const tile = document.createElement("div");

        tile.className = "tile";
        tile.dataset.value = emoji;
        tile.innerHTML = emoji;

        tile.addEventListener("click",()=>selectTile(tile));

        board.appendChild(tile);

    });

}

function selectTile(tile){

    if(
        tile.classList.contains("matched") ||
        tile.classList.contains("selected")
    ){
        return;
    }

    if(selected.length >= 2){
        return;
    }

    tile.classList.add("selected");

    selected.push(tile);

    if(selected.length === 2){

        moves++;

        movesDisplay.innerText = moves;

        const [a,b] = selected;

        if(a.dataset.value === b.dataset.value){

            setTimeout(()=>{

                a.classList.add("matched");
                b.classList.add("matched");

                matchedPairs++;

                remainingDisplay.innerText =
                    emojis.length - matchedPairs;

                if(matchedPairs === emojis.length){

                    winMessage.style.display = "block";

                }

                resetSelection();

            },300);

        }else{

            setTimeout(()=>{

                a.classList.remove("selected");
                b.classList.remove("selected");

                resetSelection();

            },700);

        }

    }

}

function resetSelection(){

    selected = [];

}

startGame();

</script>

</body>
</html>
